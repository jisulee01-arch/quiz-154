<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSCO E&C AI 퀴즈</title>
<style>
:root{
  --bg:#f5f3ee;--card:#fff;--card2:#faf9f6;--bd:#e0ddd6;
  --tx:#1a1916;--mu:#7a776e;
  --ac:#2d5a3d;--al:#e8f2eb;
  --a2:#c8442a;--a2l:#fdf0ee;
  --ye:#f5c842;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{background:var(--ac);color:#fff;padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.13)}
header h1{font-size:1rem;font-weight:600}
.hbtn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:6px;padding:5px 12px;font-size:.77rem;cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.3)}
.hbtn.danger{background:rgba(200,68,42,.5);border-color:rgba(200,68,42,.7)}
.hbtn.danger:hover{background:rgba(200,68,42,.75)}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bd);padding:0 1.5rem;overflow-x:auto}
.tab{padding:11px 16px;font-size:.84rem;font-family:inherit;color:var(--mu);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
.main{max-width:760px;margin:0 auto;padding:1.4rem 1rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.15rem}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:11px;text-align:center}
.sn{font-size:1.5rem;font-weight:700}.sl{font-size:.71rem;color:var(--mu);margin-top:2px}
.cn{color:var(--ac)}.wn{color:var(--a2)}.fn{color:#c89b00}
.tbar{display:flex;align-items:center;gap:8px;margin-bottom:.85rem;flex-wrap:wrap}
.tbtn{padding:6px 12px;background:var(--card);color:var(--tx);border:1px solid var(--bd);border-radius:6px;font-size:.77rem;font-family:inherit;cursor:pointer}
.tbtn:hover{background:var(--al);border-color:var(--ac);color:var(--ac)}
.tbtn.retry{background:var(--ac);color:#fff;border-color:var(--ac)}
.tbtn.retry:hover{background:#1e4028}
.ptxt{font-size:.78rem;color:var(--mu);margin-left:auto}
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.85rem}
.fb{padding:5px 12px;background:var(--card);color:var(--mu);border:1px solid var(--bd);border-radius:99px;font-size:.74rem;font-family:inherit;cursor:pointer}
.fb.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.pw{background:var(--bd);border-radius:99px;height:5px;margin-bottom:1.15rem;overflow:hidden}
.pf{background:var(--ac);height:100%;border-radius:99px;transition:width .4s}
.qcard{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:1.35rem;margin-bottom:.95rem;position:relative}
.qm{display:flex;align-items:center;gap:8px;margin-bottom:.55rem;flex-wrap:wrap}
.qn{font-size:.72rem;color:var(--mu);font-weight:600}
.badge{font-size:.67rem;padding:2px 7px;border-radius:99px;font-weight:600}
.box{background:#e8f0fb;color:#2456a4}.bmc{background:#f0eafb;color:#6234a4}.bsa{background:#fff3e0;color:#b36200}
.favb{margin-left:auto;background:none;border:none;cursor:pointer;font-size:1.15rem;color:#d0cdc5;line-height:1;padding:2px}
.favb.on{color:var(--ye)}
.ind{position:absolute;top:11px;right:44px;font-size:.72rem;font-weight:600}
.io{color:var(--ac)}.ix{color:var(--a2)}.ip{color:var(--mu);font-weight:400}
.qt{font-size:.96rem;line-height:1.68;margin-bottom:.95rem;font-weight:500}
.oxb{display:flex;gap:10px}
.ob{flex:1;padding:11px;border:1.5px solid var(--bd);border-radius:8px;background:var(--card2);cursor:pointer;font-family:inherit;color:var(--tx);display:flex;align-items:center;justify-content:center;gap:6px;font-size:.91rem;font-weight:500}
.ob:not([disabled]):hover{background:var(--al);border-color:var(--ac)}
.ob.so{background:var(--al);border-color:var(--ac);color:var(--ac)}
.ob.sx{background:var(--a2l);border-color:var(--a2);color:var(--a2)}
.mco{display:flex;flex-direction:column;gap:7px}
.mo{padding:10px 13px;border:1.5px solid var(--bd);border-radius:8px;background:var(--card2);cursor:pointer;text-align:left;font-size:.87rem;font-family:inherit;color:var(--tx);display:flex;align-items:center;gap:10px;line-height:1.5}
.mo:not([disabled]):hover{background:var(--al);border-color:var(--ac)}
.mo.sel{background:var(--al);border-color:var(--ac);color:var(--ac);font-weight:600}
.ol{min-width:20px;height:20px;border-radius:50%;background:var(--bd);color:var(--mu);font-size:.71rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mo.sel .ol{background:var(--ac);color:#fff}
.saw{display:flex;gap:8px}
.sai{flex:1;padding:10px 13px;border:1.5px solid var(--bd);border-radius:8px;font-size:.87rem;font-family:inherit;background:var(--card2);color:var(--tx);outline:none;resize:none;min-height:40px}
.sai:focus{border-color:var(--ac);background:#fff}
.subb{padding:10px 15px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-family:inherit;cursor:pointer;font-weight:600;white-space:nowrap}
.subb:hover:not([disabled]){background:#1e4028}
.subb[disabled]{background:var(--bd);color:var(--mu);cursor:default}
.fbk{margin-top:.85rem;border-radius:8px;padding:.85rem 1rem;font-size:.84rem;line-height:1.7;display:none}
.fbk.show{display:block}
.fbk.ok{background:var(--al);border-left:3px solid var(--ac)}
.fbk.ng{background:var(--a2l);border-left:3px solid var(--a2)}
.fbh{font-weight:700;font-size:.91rem;margin-bottom:4px}
.fbk.ok .fbh{color:var(--ac)}.fbk.ng .fbh{color:var(--a2)}
.fba{color:var(--mu);font-size:.79rem;margin:3px 0 5px}
.empty{text-align:center;padding:3.5rem 2rem;color:var(--mu);font-size:.9rem}
.retry-banner{background:var(--ac);color:#fff;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px}
.retry-banner p{font-size:.88rem;line-height:1.5}
.retry-banner button{background:#fff;color:var(--ac);border:none;border-radius:6px;padding:7px 14px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit}
@media(max-width:600px){.main{padding:1rem .75rem}header{padding:.75rem 1rem}.tabs{padding:0 .75rem}}
</style>
</head>
<body>
<header>
  <h1>POSCO E&amp;C AI 퀴즈 (154문제)</h1>
  <button class="hbtn danger" onclick="confirmReset()">초기화</button>
</header>
<div class="tabs">
  <button class="tab active" id="tb-all"   onclick="switchTab(&quot;all&quot;)">전체 문제</button>
  <button class="tab"        id="tb-fav"   onclick="switchTab(&quot;fav&quot;)">즐겨찾기</button>
  <button class="tab"        id="tb-wrong" onclick="switchTab(&quot;wrong&quot;)">오답 문제</button>
</div>
<div class="main">
  <div class="stats">
    <div class="sc"><div class="sn cn" id="sc">0</div><div class="sl">맞힌 문제</div></div>
    <div class="sc"><div class="sn wn" id="sw">0</div><div class="sl">틀린 문제</div></div>
    <div class="sc"><div class="sn fn" id="sf">0</div><div class="sl">즐겨찾기</div></div>
  </div>

  <!-- 전체 탭 -->
  <div id="pv-all">
    <div class="fbar">
      <button class="fb on" id="ff-all" onclick="setFilter(&quot;all&quot;)">전체</button>
      <button class="fb"    id="ff-ox"  onclick="setFilter(&quot;ox&quot;)">O/X</button>
      <button class="fb"    id="ff-mc"  onclick="setFilter(&quot;mc&quot;)">객관식</button>
      <button class="fb"    id="ff-sa"  onclick="setFilter(&quot;sa&quot;)">단답형</button>
      <button class="fb"    id="ff-un"  onclick="setFilter(&quot;un&quot;)">미완료</button>
    </div>
    <div class="tbar">
      <button class="tbtn" onclick="doShuffle()">🔀 섞기</button>
      <button class="tbtn" onclick="doReorder()">↩ 순서복원</button>
      <span class="ptxt" id="ptxt">0 / 154 완료</span>
    </div>
    <div class="pw"><div class="pf" id="pb" style="width:0%"></div></div>
    <div id="ql"></div>
  </div>

  <!-- 즐겨찾기 탭 -->
  <div id="pv-fav" style="display:none">
    <div class="tbar">
      <button class="tbtn retry" onclick="retryFav()">&#9654; 즐겨찾기만 다시 풀기</button>
      <button class="tbtn" id="stop-fav" style="display:none" onclick="clearRetry()">&#10006; 모드 종료</button>
    </div>
    <div id="fl"></div>
  </div>

  <!-- 오답 탭 -->
  <div id="pv-wrong" style="display:none">
    <div class="tbar">
      <button class="tbtn retry" onclick="retryWrong()">&#9654; 오답만 다시 풀기</button>
      <button class="tbtn" id="stop-wrong" style="display:none" onclick="clearRetry()">&#10006; 모드 종료</button>
    </div>
    <div id="wl"></div>
  </div>
</div>

<script id="qdata" type="application/json">
[{"id":15,"type":"ox","text":"AI 학습에서 배치(Batch) 크기를 크게 설정하면 학습 속도는 빨라지지만, 메모리 사용량이 줄 어든다.","answer":"X","explanation":"배치(Batch) 크기는 AI가 한 번에 학습하는 데이터 샘플의 개수입니다. 배치를 크게 설정하면 학습 속도는 빨라지지만 메모리 사용량이 '늘어나고', 반대로 작게 설정하면 메모리는 적게 쓰지만 학습이 느려집니다. 적절한 배치 크기 설정이 AI 학습 효율의 핵심입니다."},{"id":19,"type":"ox","text":"RAG(검색증강생성)는 AI가 외부 데이터베이스를 검색해 최신 정보를 답변에 반영하는 방식 이다.","answer":"O","explanation":"학습 데이터의 한계를 보완하기 위해 질문과 관련된 최신 문서를 검색해서 AI 답변에 활용하 는 방식입니다. 회사 내부 문서 기반 챗봇에 많이 사용됩니다."},{"id":36,"type":"mc","text":"GAN(생성적 적대 신경망)에서 두 구성 요소는 무엇인가?","answer":"생성자와 판별자","explanation":"생성자는 진짜 같은 가짜 데이터를 만들고, 판별자는 진짜와 가짜를 구별합니다. 이 경쟁을 통해 점점 더 사실적인 콘텐츠가 생성됩니다.","options":["인코더와 디코더","생성자와 판별자","교사 모델과 학생 모델","입력층과 출력층"]},{"id":39,"type":"sa","text":"AI가 사람의 말을 이해하려면 문장을 단어나 의미 단위로 잘게 나누는 전처리 과정이 필요한 데, 이 과정을 무엇이라고 하나요?","answer":"토큰화 (Toke nizati on)","explanation":"토큰화(Tokenization)는 AI가 텍스트를 처리하기 전에 문장을 단어·하위 단어(Subword)·문자 등의 의미 단위로 잘게 나누는 전처리 과정입니다. 예를 들어 '인공지능 학습'을 ['인공', '지능 ', ' ', '학습']처럼 나누어 AI가 각 조각의 의미를 계산할 수 있게 합니다. 대표적인 토큰화 방식 으로는 BPE(Byte Pair Encoding), WordPiece, SentencePiece 등이 있으며, ChatGPT와 같은 LLM은 이 토큰 단위로 텍스트를 입력받고 다음 토큰을 예측하는 방식으로 답변을 생성합니 다. 토큰화는 자연어 처리(NLP)의 가장 기초적인 단계로, 토큰화 품질이 AI 모델의 성능에 직 접적인 영향을 미칩니다."},{"id":40,"type":"sa","text":"인터넷 연결 없이 스마트폰·노트북 등 사용자 기기 내부 자체에서 연산을 수행하는 AI 기술 은?","answer":"온디바 이스 AI","explanation":"보안성이 높고 응답 속도가 빠르며 통신 비용이 발생하지 않는 방식입니다. 비슷한 개념인 엣 지 AI(Edge AI)는 로컬 서버·기지국 등 현장 근처에서 처리하는 광의의 개념으로, 온디바이스 AI는 엣지 AI에 포함되는 하위 개념입니다."},{"id":44,"type":"ox","text":"엣지 AI(Edge AI)는 클라우드 서버가 아닌 기기 자체에서 AI 연산을 수행하는 방식이다.","answer":"O","explanation":"스마트폰, CCTV, 드론 등 기기 내에서 직접 AI를 실행하면 인터넷 없이도 작동하고 개인정보 유출 위험도 줄어듭니다."},{"id":49,"type":"mc","text":"AI 모델 학습에 필요한 데이터가 부족하거나 개인정보 문제로 실제 데이터를 활용하기 어려 울 때, AI가 실제와 유사한 가상의 데이터를 생성하여 학습에 활용하는 기술은?","answer":"합성 데이터(Synthetic Data)","explanation":"합성 데이터(Synthetic Data)란 AI가 실제 데이터의 통계적 특성을 반영하여 생성한 가상의 데이터입니다. 의료·금융 등 개인정보 민감 분야에서 실제 데이터 대신 활용하거나, 데이터 부족 문제를 해 결하는 데 효과적입니다. 데이터 라벨링은 사람이 정답을 태그하는 작업, 데이터 증강은 기존 데이터를 회전·반전 등으로 변형하는 기법, 전이 학습은 학습된 모델을 다른 과제에 재활용하는 방식입니다.","options":["데이터 라벨링(Data Labeling)","합성 데이터(Synthetic Data)","데이터 증강(Data Augmentation)","전이 학습(Transfer Learning)"]},{"id":50,"type":"mc","text":"다음 중 대형 언어 모델(LLM)이 텍스트를 생성하는 원리로 가장 가까운 것은?","answer":"이전 단어들을 바탕으로 다음에 올 가장 적절한 단어를 확률적으로 예측한다","explanation":"LLM은 앞서 나온 단어들의 맥락을 바탕으로 다음 단어를 확률적으로 예측하는 방식을 반복 해 문장을 생성합니다. 의식이나 이해가 아닌 통계적 패턴 예측입니다.","options":["미리 저장된 답변을 검색해서 출력한다","이전 단어들을 바탕으로 다음에 올 가장 적절한 단어를 확률적으로 예측한다","사람처럼 생각하고 이해해서 답변한다","인터넷 전체를 실시간으로 검색해서 답한다"]},{"id":56,"type":"ox","text":"임베딩(Embedding)은 단어나 문장을 숫자 벡터로 변환해 AI가 의미를 이해할 수 있게 하는 기술이다.","answer":"O","explanation":"\"왕 = 남자, 여자 = 여왕\"처럼 단어 간 관계를 수학적으로 계산할 수 있는 것이 임베딩 덕 분입니다. 의미가 비슷한 단어는 벡터 공간에서 가까이 위치합니다."},{"id":66,"type":"ox","text":"제미나이 NotebookLM에 업무 지침 PDF를 업로드하면, AI가 해당 문서 내용만을 근거로 답 변하므로 외부 정보에 의한 환각(할루시네이션) 위험이 줄어든다.","answer":"O","explanation":"NotebookLM은 사용자가 업로드한 문서만을 지식 기반으로 사용하는 그라운디드 (Grounded) AI입니다. 일반 ChatGPT처럼 학습 데이터 전체에서 답변을 생성하는 것이 아니 라, 업로드된 문서 범위 내에서만 응답하므로 환각 위험이 크게 줄어듭니다. 다만 문서 자체 에 오류가 있으면 잘못된 답변이 나올 수 있어 원문 검증은 여전히 필요합니다."},{"id":72,"type":"mc","text":"구글이 만든 AI 기반 문서 분석·요약 도구로, PDF·유튜브 영상 등을 업로드하면 AI가 내용을 분석해 요약·질의응답·팟캐스트 형식 오디오까지 자동 생성해주는 서비스는?","answer":"NotebookLM","explanation":"NotebookLM(노트북LM)은 구글이 개발한 AI 문서 분석 도구입니다. 규정집·기술 보고서·회의 록 등을 업로드하면 AI가 내용을 이해하고 요약·Q&A를 제공하며, 특히 업로드 문서를 기반으 로 팟캐스트 형식의 오디오 브리핑을 자동 생성하는 기능이 큰 주목을 받고 있습니다.","options":["NotebookLM","Google Docs","Evernote","Notion AI"]},{"id":80,"type":"sa","text":"AI 기반 회의 자동 기록 및 요약 서비스로, 회의 내용을 자동으로 텍스트화하고 요약해주는 대표적인 서비스 이름은?","answer":"Otter. ai (또 는 Clova Note)","explanation":"Otter.ai, Clova Note 등은 AI가 회의 내용을 실시간으로 기록하고 요약해주는 서비스로, 업무 생산성 향상에 크게 기여합니다."},{"id":81,"type":"mc","text":"앤스로픽(Anthropic)의 클로드(Claude) 모델 시리즈를 가장 대형(고성능)에서 가장 소형(경 량) 순으로 올바르게 나열한 것은?","answer":"Opus → Sonnet → Haiku","explanation":"클로드(Claude) 모델 시리즈는 Opus(대형) → Sonnet(중형) → Haiku(소형) 순으로 구성됩니 다. Opus는 가장 크고 복잡한 작업에, Sonnet은 성능과 속도의 균형을, Haiku는 빠른 응답이 필요한 경량 작업에 각각 최적화되어 있습니다. 참고로 이 이름들은 모두 시(詩)의 형식에서 따온 것입니다.","options":["Haiku → Sonnet → Opus","Sonnet → Opus → Haiku","Opus → Sonnet → Haiku","Opus → Haiku → Sonnet"]},{"id":83,"type":"sa","text":"생성형 AI가 내놓은 결과물을 그대로 믿지 않고, 사람이 직접 개입하여 오류를 검증하고 수정 하며 최종 결과물의 신뢰성을 확보하는 과정을 뜻하는 용어는? (힌트: 특히 AI의 학습 과정이 나 운영 중에 인간의 판단을 반영하는 이 원칙)","answer":"HITL (인간 개입)","explanation":"HITL은 AI가 모든 것을 결정하게 두지 않고, 반드시 인간의 검증 단계를 거치게 설계하는 방 식입니다. AI의 환각(Hallucination) 현상을 방지하고, 기업의 업무 프로세스에서 최종 책임과 품질을 사람이 관리한다는 강력한 의지를 담은 실무 용어입니다."},{"id":87,"type":"sa","text":"수주 단계에서 입찰서(ITB) 관리, 현장설명회 등 수주정보를 관리하는 당사 입찰관리시스템 은?","answer":"BIZMa ster","explanation":"영업시스템(BIZ-Master)은 데이터 기반 분석으로 수주 전략을 돕고 수주 입찰을 위한 각종 절 차를 입력 및 관리할 수 있는 사내 시스템입니다."},{"id":93,"type":"sa","text":"입찰초청서(ITB) 등 입찰문서를 AI를 통해 리스크를 검토할 수 있는 당사 사내 플랫폼 이름 은?","answer":"POS- DOC ITB 문 서검토","explanation":"24년도 RAG 기술을 활용하여 ITB, 계약서 등을 분석하여 RISK를 검토할 수 있게 개발된 AI 검 토 플랫폼입니다"},{"id":96,"type":"mc","text":"포스코이앤씨에서 데이터 분석에 필요한 데이터를 저장하고 관리하기 위해 공식적으로 사용 하는 외부 클라우드 플랫폼은?","answer":"Microsoft Azure","explanation":"Microsoft Azure는 포스코이앤씨가 데이터 분석용 데이터를 저장·관리하기 위해 공식 도입한 클라우드 플랫폼입니다. Power BI, AI 서비스 등 Microsoft 제품과의 연동이 용이하여 데이터 기반 업무 환경을 지원합니다.","options":["Microsoft Azure","Amazon AWS","Google Cloud","Naver Cloud"]},{"id":100,"type":"sa","text":"AI 시스템의 공정성·투명성·책임성·안전성 등을 전사적으로 관리하고, AI 관련 의사결정의 기준과 절차를 수립하는 체계를 무엇이라 하는가?","answer":"AI 거버넌스","explanation":"AI 거버넌스(AI Governance)란 AI 시스템의 개발·도입·운영 전 과정에서 공정성, 투명성, 책임성, 안전성, 개인정보 보호를 체계적으로 관리하는 전사적 프레임워크입니다."},{"id":101,"type":"ox","text":"AI라는 용어는 1956년 다트머스 회의에서 처음 제안되었다.","answer":"O","explanation":"1956년 미국 다트머스 대학에서 존 매카시 교수가 'Artificial Intelligence(인공지능)'라는 용어 를 처음 제안하며 AI 연구의 공식적인 출발점이 되었습니다. 이 회의에는 마빈 민스키, 클로 드 섀넌 등 초기 AI 연구자들이 참여하여, '기계가 인간처럼 생각할 수 있는가'를 논의한 역사 적 사건입니다."},{"id":102,"type":"ox","text":"인공지능(AI)은 컴퓨터가 인간의 지능적 행동을 모방하도록 만드는 기술이다.","answer":"O","explanation":"인공지능(AI)은 학습, 추론, 문제 해결, 언어 이해, 시각 인식 등 인간의 지능적 활동을 컴퓨터 가 수행하도록 만드는 기술입니다. 단순히 정해진 명령을 실행하는 것이 아니라, 데이터에서 패턴을 스스로 발견하고 경험을 통해 성능을 개선하는 것이 핵심입니다. 오늘날 쳄봇 (ChatGPT), 자율주행, 의료 진단 AI 등이 모두 이 기술을 기반으로 합니다."},{"id":118,"type":"ox","text":"클라우드 컴퓨팅은 물리적인 서버를 직접 소유하지 않고 인터넷을 통해 자원을 빌려 쓰는 방 식이다.","answer":"O","explanation":"P-GPT 역시 클라우드 인프라 기반으로 운영됩니다."},{"id":124,"type":"mc","text":"AI 연산을 가속화하기 위해 최근 스마트폰 칩 등에 포함되는 전용 반도체는?","answer":"NPU","explanation":"NPU(Neural Processing Unit)는 AI 연산에 특화된 반도체로, 최근 스마트폰과 PC에 탑재되어 AI 기능을 가속화합니다.","options":["BIOS","OS","NPU","DRAM"]},{"id":125,"type":"mc","text":"빅데이터의 특징인 3V에 해당하지 않는 요소는?","answer":"Visuality(시각성)","explanation":"빅데이터의 3V는 Volume(규모), Velocity(속도), Variety(다양성)입니다. Visuality(시각성)는 데 이터 시각화(Visualization)와 혹동할 수 있지만, 3V에는 포함되지 않습니다. 참고로 3V를 확 장한 개념으로는 Veracity(정확성), Value(가치)를 추가한 5V가 있습니다.","options":["Volume(규모)","Velocity(속도)","Variety(다양성)","Visuality(시각성)"]},{"id":132,"type":"sa","text":"데이터를 통해 기계가 스스로 학습하는 기술을 일컫는 말은?","answer":"머신러 닝","explanation":"머신러닝(Machine Learning)은 인공지능의 한 분야로 데이터 기반 학습이 핵심입니다."},{"id":133,"type":"ox","text":"세계 최초의 웹 브라우저는 1990년대 초반 팀 버너스리가 개발하였다.","answer":"O","explanation":"팀 버너스리는 1990년 세계 최초의 웹 브라우저와 웹 서버를 개발하여 월드와이드웹(WWW) 의 기반을 마련했습니다."},{"id":134,"type":"ox","text":"에니악(ENIAC)은 세계 최초의 상용 인공지능 컴퓨터로 설계되었다.","answer":"X","explanation":"에니악(ENIAC)은 1946년 미국 펜실베이니아 대학에서 개발된 세계 최초의 범용 디지털 컴퓨 터입니다. 원래 탄도 그적 계산을 위해 만들어졌으며, AI 전용이 아닌 다양한 연산을 처리할 수 있는 범용 컴퓨터였습니다. 무게 30톤, 진공관 18,000개로 방 하나를 가득 채울 정도의 거 대한 크기였습니다."},{"id":139,"type":"ox","text":"2024년 노벨 물리학상을 받은 제프리 힌턴(Geoffrey Hinton) 교수는 트랜스포머 (Transformer) 구조를 발명하여 현대 딥러닝의 근간을 세웠다.","answer":"X","explanation":"제프리 힌턴 교수는 2024년 노벨 물리학상을 존 홀필드(John Hopfield)와 공동 수상한 것은 맞지만, 트랜스포머를 발명한 것은 아닙니다. 트랜스포머는 2017년 구글 연구팀이 논문 \"Attention Is All You Need\"에서 발표한 구조입니다. 힌턴의 핵심 공헌은 역전파 (Backpropagation) 알고리즘 발전, 볼츠만 머신(Boltzmann Machine) 등 인공신경망의 기초 를 정립한 것이며, 이는 통계물리학 원리에 기반한 공헌으로 인정받아 물리학상을 수상했습 니다. 'AI의 대부'로 불리는 힌턴은 딥러닝의 근간을 세운 것은 맞지만, 그 기여는 트랜스포머 가 아닌 신경망 학습 기법 자체에 있습니다."},{"id":141,"type":"mc","text":"AI 연산에 최적화되어 대량의 데이터를 동시에 병렬로 처리하는 장치는?","answer":"GPU","explanation":"GPU(Graphics Processing Unit)는 원래 그래픽 처리용이었으나, 병렬 연산 능력이 뛰어나 현 재 AI 학습에 핵심적으로 사용됩니다.","options":["HDD","GPU","SSD","Mainboard"]},{"id":145,"type":"mc","text":"1969년 초기 AI 연구의 한계로 지적된 것은?","answer":"XOR 문제 해결 불가","explanation":"당시의 단층 신경망은 XOR 같은 기본적인 비선형 논리 문제를 해결하지 못해 첫 번째 AI 암 흑기를 맞이했습니다","options":["XOR 문제 해결 불가","데이터 부족","전용 칩 부재","클라우드 미비"]},{"id":149,"type":"sa","text":"2012년 세계적인 이미지 인식 대회(ImageNet)에서 압도적 성능으로 우승하며, 딥러닝 시대 의 문을 연 합성곱 신경망(CNN) 모델의 이름은?","answer":"알렉스 넷","explanation":"알렉스넷(AlexNet)은 토론토 대학의 알렉스 크리젯스키(Alex Krizhevsky)가 개발한 합성곱 신 경망(CNN) 모델로, 2012년 ImageNet 대회(ILSVRC)에서 오류율 15.3%를 기록하며 2위 (26.2%)를 큰 격차로 따돌리며 우승했습니다. 이 사건이 AI 역사에서 중요한 이유는, 기존의 수작업 특징 추출 방식을 딥러닝이 압도적으로 넘어선다는 것을 실증했기 때문입니다. 이후 구글, 메타, 마이크로소프트 등 글로벌 기업들이 딥러닝 연구에 대규모 투자를 시작하는 계기가 되었고, 현재의 AI 전성시대로 이어지는 출발 점이 되었습니다. 참고로 AlexNet의 지도교수인 제프리 힌턴(Geoffrey Hinton)은 이 공로로 '딥러닝의 아버지' 로 불리며, 2024년 노벨 물리학상을 수상했습니다."},{"id":152,"type":"mc","text":"2017년 구글이 발표한 논문에서 제안되어, 현재 ChatGPT·Gemini 등 거의 모든 대형 AI 모델 의 기반 구조가 된 핵심 기술은?","answer":"트랜스포머(Transformer)","explanation":"트랜스포머(Transformer)는 2017년 구글 연구팀이 논문 「Attention Is All You Need」에서 발 표한 신경망 구조입니다. 기존에는 데이터를 순서대로 하나씩 처리했지만, 트랜스포머는 '어 텐션(Attention)' 메커니즘으로 전체 데이터를 동시에 참조하며 처리할 수 있어 속도와 성능 이 비약적으로 향상되었습니다. ChatGPT의 'T'가 바로 Transformer의 약자이며, 구글 Gemini, 메타 LLaMA, 앨스로픽 Claude 등 현재 거의 모든 대형 언어 모델(LLM)이 이 구조를 기반으로 합니다. 2번 퍼셉트론은 1957년 최초의 인공 신경망 모델, 3번 오토인코더는 데이터를 압축·복원하는 신경망 기법, 4번 강화학습은 보상을 통해 학습하는 방식으로, 모두 중요한 AI 기술이지만 현 재 LLM의 '기반 구조'는 아닙니다.","options":["트랜스포머(Transformer)","퍼셉트론(Perceptron)","오토인코더(Autoencoder)","강화학습(Reinforcement Learning)"]},{"id":167,"type":"ox","text":"GPU는 AI 학습에 가장 많이 사용되는 반도체로, AI 연산을 위해 개발 초기부터 설계된 전용 칩이다.","answer":"X","explanation":"GPU(Graphics Processing Unit)는 원래 AI가 아닌 게임·영상 등의 그래픽 처리를 위해 설계된 반도체입니다. 그러나 수천~수만 개의 코어로 대량의 단순 연산을 동시에 처리하는 병렬 연 산 능력이 AI의 행렬 곱셈 등에 매우 적합하여 AI 학습용으로 활용되기 시작했습니다. 특히 엔비디아(NVIDIA)의 GPU가 AI 시장의 핵심 부품으로 자리잡았습니다. 참고로 AI 연산에 처음 부터 특화되어 설계된 칩으로는 Google의 TPU(Tensor Processing Unit) 등이 있습니다."},{"id":191,"type":"mc","text":"다음 중 지도학습의 사례로 가장 적절한 것은?","answer":"스팸/정상 이메일로 분류된 데이터로 스팸 필터 학습","explanation":"정답(스팸/정상)이 표시된 데이터로 학습시키는 것이 지도학습입니다. 1번은 비지도학습, 3번 은 강화학습입니다.","options":["정답 없이 고객을 비슷한 그룹으로 묶기","스팸/정상 이메일로 분류된 데이터로 스팸 필터 학습","게임 점수로 AI가 스스로 실력 키우기","데이터 없이 AI가 스스로 규칙 발견하기"]},{"id":199,"type":"mc","text":"사진·영상 속 물체의 특징을 단계적으로 추출하여 이미지 분류·객체 탐지 등에 가장 특화된 신경망 구조는?","answer":"CNN(합성곱 신경망)","explanation":"CNN(Convolutional Neural Network, 합성곱 신경망)은 이미지의 국소적 특징(선, 모서리, 질 감 등)을 합성곱(필터) 연산으로 단계적으로 추출하는 구조로, 이미지 분류·객체 탐지·얼굴 인 식 등에 가장 널리 사용됩니다. 입력 이미지에 여러 개의 필터를 적용하여 특징 맵(Feature Map)을 만들고, 풀링(Pooling)으로 핵심 정보만 압축한 뒤 최종 분류하는 방식입니다. 건설 현장의 균열 감지, 안전모 미착용 탐지, 의료 영상 판독 등에 활용됩니다. RNN은 순서 데이 터, GAN은 이미지 생성, ANN은 신경망의 가장 기본적인 구조입니다.","options":["CNN(합성곱 신경망)","RNN(순환 신경망)","ANN(인공 신경망)","GAN(생성적 적대 신경망)"]},{"id":202,"type":"mc","text":"다음 중 AI 보안 위협의 종류와 설명이 올바르게 연결된 것은?","answer":"적대적 공격 : 픽셀을 미세하게 조작해 AI가 오분류하도록 유도","explanation":"적대적 공격(Adversarial Attack) 은 사람 눈에는 정상으로 보이는 이미지에 미세한 픽셀 변형 을 가해 AI가 잘못 분류하도록 유도하는 기법입니다. 예를 들어 정지 표지판에 스티커를 붙여 자율주행 AI가 속도제한 표지판으로 인식하게 만드는 것이 대표적입니다.","options":["데이터 포이즈닝 : 모델 출력값으로 학습 데이터를 복원","적대적 공격 : 픽셀을 미세하게 조작해 AI가 오분류하도록 유도","모델 역추론 : 학습 데이터에 악성 샘플을 섞어 모델을 오염","프롬프트 인젝션 : AI 모델 자체를 물리적으로 파괴"]},{"id":216,"type":"sa","text":"프로그래밍 언어를 직접 작성하지 않고, 드래그 앤 드롭이나 AI 대화 등으로 앱·웹사이트를 만들 수 있는 개발 방식을 무엇이라 하나요?","answer":"노코드","explanation":"노코드(No-code)란 프로그래밍 코드를 직접 작성하지 않고도 소프트웨어를 개발할 수 있는 방식입니다. 드래그 앤 드롭, 시각적 블록 조합, AI 대화 등의 방법으로 앱이나 웹사이트를 만 들 수 있습니다. 대표적인 노코드 플랫폼으로는 Bubble, Glide, 네이버 앱시트 등이 있으며, 최근에는 ChatGPT 등 생성형 AI와 결합해 대화만으로 앱을 만드는 'AI 노코드' 트렌드가 확산 되고 있습니다. 비슷한 개념으로 로우코드(Low-code)가 있는데, 이는 최소한의 코딩만으로 개발하는 방식으로 노코드보다 커스터마이징 자유도가 높습니다. 노코드는 비개발자도 아이 디어를 빠르게 구현할 수 있어 '시민 개발자(Citizen Developer)' 시대를 여는 핵심 트렌드로 주목받고 있습니다."},{"id":219,"type":"sa","text":"AI 학습에 사용할 데이터에 정답을 표시하는 작업을 무엇이라고 하나요?","answer":"레이블 링","explanation":"강아지 사진에 \"강아지\", 고양이 사진에 \"고양이\"라고 표시하는 것이 레이블링입니다. AI 학습 의 품질은 레이블링의 정확도에 크게 달라집니다."},{"id":220,"type":"sa","text":"AI 서비스를 위해 외부 개발자가 특정 데이터를 활용할 수 있도록 제공하는 연결 인터페이스 를 무엇이라고 하나요?","answer":"API","explanation":"Application Programming Interface의 약자입니다. 카카오 지도 API, 네이버 번역 API처럼 외 부 서비스의 기능을 내 앱에 연결할 때 사용합니다."},{"id":225,"type":"sa","text":"ChatGPT 등 대화형 AI에게 최신 뉴스를 물었을 때 정확하게 답하지 못하는 경우가 있는데, 이는 AI가 학습한 데이터의 기준 날짜 이후 정보를 모르기 때문입니다. 이 한계를 가리키는 용어는?","answer":"학습 컷오프","explanation":"학습 컷오프(Training Cutoff 또는 Knowledge Cutoff)란 AI 모델이 학습에 사용한 데이터의 마지막 시점을 말합니다. 이 날짜 이후의 사건·뉴스·변화는 AI가 알 수 없어, 잘못된 정보를 자 신 있게 답하는 '환각(Hallucination)'의 원인이 되기도 합니다. 예를 들어 학습 컷오프가 2024년 6월인 AI에게 \"2025년 월드시리즈 우승팀은?\"이라고 물으 면, 정확한 답을 할 수 없습니다. 이 한계를 보완하기 위해 RAG(검색 증강 생성) 기술이 활용되는데, AI가 답변 전에 실시간으 로 외부 데이터를 검색해 최신 정보를 반영하는 방식입니다. 업무에서 AI를 활용할 때는 컷오 프 날짜를 확인하고, 최신 정보가 필요한 질문에는 검색 기능을 함께 사용하는 것이 중요합니 다."},{"id":227,"type":"sa","text":"AI가 텍스트(문자)를 입력받아 사람의 목소리처럼 자연스러운 음성으로 변환해 주는 기술을 무엇이라고 하나요?","answer":"텍스트 음성 변환","explanation":"TTS(Text-To-Speech)는 텍스트를 음성으로 변환하는 기술로, 딥러닝 기반 모델이 텍스트의 의미와 문맥을 분석하여 억양·발음·속도 등을 자연스럽게 생성합니다. 내비게이션 안내 음성, AI 오디오북, 콜센터 AI 상담, 키오스크 음성 안내 등에 널리 활용되며, 최근에는 다국어 지원 과 감정 표현까지 가능한 수준으로 발전하고 있습니다. 반대로 음성을 텍스트로 변환하는 기 술은 STT(Speech-To-Text)라고 합니다."},{"id":242,"type":"ox","text":"AI 모델의 \"정밀도(Precision)\"와 \"재현율(Recall)\"은 항상 동시에 높일 수 있다.","answer":"X","explanation":"정밀도와 재현율은 트레이드오프 관계입니다. 정밀도를 높이면 재현율이 낮아지는 경향이 있 으며, 이 둘의 균형을 나타내는 지표가 F1 스코어입니다."},{"id":243,"type":"ox","text":"구글의 지식 그래프(Knowledge Graph)는 개념들 사이의 관계를 노드와 엣지로 표현한 구조 화된 데이터베이스다.","answer":"O","explanation":"구글 검색 결과 오른쪽에 나타나는 연관 정보 박스가 지식 그래프를 활용한 대표 사례입니다. AI가 개념 간 관계를 이해하는 데 도움을 줍니다."},{"id":246,"type":"ox","text":"AI 모델을 학습시킬 때 \"에포크(Epoch)\"란 전체 학습 데이터를 한 번 완전히 학습한 횟수를 의미한다.","answer":"O","explanation":"에포크는 교과서를 처음부터 끝까지 1회 읽는 것에 비유할 수 있습니다. 1에포크 = 전체 데 이터를 1번 학습, 10에포크 = 10번 반복 학습입니다. 너무 적게 읽으면 내용을 못 외우고(과 소적합), 너무 많이 읽으면 문제를 달달 외워서 응용을 못 하게 됩니다(과적합)."},{"id":255,"type":"ox","text":"워드 임베딩(Word Embedding) 기술을 사용하면 \"서울\"과 \"도쿄\"가 의미적으로 유사하다 고 계산될 수 있다.","answer":"O","explanation":"\"서울\"과 \"도쿄\"는 \"수도\", \"아시아\", \"대도시\" 등 유사한 맥락에서 등장하므로 벡터 공간에서 가깝게 위치합니다. 워드 임베딩은 이처럼 단어의 의미적 관계를 수치 벡터로 표현해 AI가 언 어를 이해하는 핵심 기술입니다."},{"id":256,"type":"ox","text":"AI 모델을 학습할 때 검증 데이터(Validation Set)는 학습 중 모델 성능을 점검하는 데 사용 한다.","answer":"O","explanation":"전체 데이터를 학습용·검증용·테스트용으로 분리합니다. 검증 데이터는 학습 중 과적합 여부 를 모니터링하고 하이퍼파라미터를 조정하는 데 사용됩니다. 테스트 데이터는 최종 성능 평 가용으로 학습 과정에서 사용되지 않습니다."},{"id":262,"type":"mc","text":"AI 모델의 성능을 높이기 위해 학습률, 배치 크기, 에포크 수 등을 사람이 직접 조정하는 값들 을 뭔라 하는가?","answer":"하이퍼파라미터","explanation":"하이퍼파라미터는 AI가 스스로 배우는 값(파라미터)과 달리, 사람이 직접 설정해주는 값입니 다. 학습률(얼마나 빨리 배울지), 배치 크기(한 번에 얼마나 보여줄지), 에포크 수(몇 번 반복할 지) 등이 있으며, 이 값을 잘 조정해야 모델 성능이 좋아집니다.","options":["하이퍼파라미터","파라미터","가중치","손실함수"]},{"id":265,"type":"mc","text":"AI 성능과 지능 규모를 결정하는 시냅스 연결 수치를 뜻하는 말은?","answer":"매개변수(파라미터)","explanation":"인간 뇌의 시냅스와 같은 역할로, 이 숫자가 많을수록 모델이 더 복잡하고 방대한 정보를 기 억합니다.","options":["토큰","레이어","매개변수(파라미터)","노드"]},{"id":268,"type":"mc","text":"클라우드 기반 무료GPU 환경에서 AI 개발을 할수 있는 구글의 서비스는?","answer":"Colab","explanation":"인프라 구축 없이 무료로 GPU 환경에서 AI 모델링을 할 수 있는 웹 서비스입니다.","options":["Siri","Alexa","Colab","Excel"]},{"id":269,"type":"mc","text":"개발자가 작성한 코드를 다른 사람이나 AI가 검토하여 버그, 보안 취약점, 성능 문제 등을 점 검하는 과정을 뭐라 하는가?","answer":"코드 리뷰(Code Review)","explanation":"코드 리뷰(Code Review)는 작성된 코드를 제3자가 검토하여 버그, 논리 오류, 보안 취약점, 성능 문제 등을 점검하는 과정입니다. 디버깅은 이미 발생한 오류를 추적·수정하는 것이고, 리팩토링은 기능은 유지하면서 코드 구조를 개선하는 것입니다. 최근에는 GitHub Copilot, ChatGPT 등 AI 도구가 코드 리뷰를 자동으로 수행하여 개발 생산 성을 높이고 있습니다.","options":["코드 리뷰(Code Review)","디버깅(Debugging)","컴파일(Compile)","리팩토링(Refactoring)"]},{"id":275,"type":"mc","text":"AI 모델 학습에서 \"배치(Batch)\"란 무엇인가?","answer":"한 번에 학습에 사용하는 데이터의 묶음","explanation":"전체 데이터를 한꺼번에 학습시키는 것이 아니라, 일정 크기의 묶음(배치)으로 나눠 반복 학 습합니다. 일반적으로 배치 크기는 32, 64, 128, 256 등을 사용하며, 크게 설정하면 학습이 빠 르지만 메모리가 많이 필요하고, 작게 설정하면 정밀하지만 시간이 오래 걸립니다.","options":["모델을 저장하는 파일 형식","한 번에 학습에 사용하는 데이터의 묶음","AI 서버의 성능 단위","파라미터를 초기화하는 방법"]},{"id":280,"type":"mc","text":"AI 학습에서 옵티마이저(Optimizer)의 역할은?","answer":"손실을 최소화하기 위해 파라미터를 업데이트하는 알고리즘","explanation":"학습 과정에서 손실함수를 최소화하는 방향으로 파라미터 값을 조금씩 조정하는 것이 옵티마 이저의 역할입니다. Adam, SGD 등이 대표적입니다.","options":["데이터를 수집하는 도구","손실을 최소화하기 위해 파라미터를 업데이트하는 알고리즘","AI 모델을 압축하는 기술","GPU 성능을 높이는 소프트웨어"]},{"id":285,"type":"mc","text":"AI 학습에서 \"배치 정규화(Batch Normalization)\"의 목적은?","answer":"각 배치의 출력 분포를 안정화해 학습 속도를 높인다","explanation":"배치 정규화는 각 레이어의 입력 분포를 균일하게 유지해 학습 속도를 높이고 과적합을 줄이 는 기법입니다.","options":["데이터를 삭제한다","각 배치의 출력 분포를 안정화해 학습 속도를 높인다","모델 파라미터를 줄인다","에포크 수를 늘린다"]},{"id":290,"type":"mc","text":"다음 중 \"클라우드 AI\"의 장점이 아닌 것은?","answer":"데이터 외부 전송 없이 높은 보안 보장","explanation":"클라우드 AI는 데이터를 외부 서버로 전송하므로 보안 민감 업종에서는 리스크가 있습니다. 높은 보안이 필요하다면 온프레미스 방식이 더 적합합니다.","options":["빠른 도입과 확장성","초기 구축 비용 없음","데이터 외부 전송 없이 높은 보안 보장","다양한 최신 AI 모델 즉시 사용 가능"]},{"id":301,"type":"sa","text":"LLM AI 모델이 한 번에 기억하고 처리할 수 있는 정보의 범위를 뜻하는 용어는?","answer":"컨텍스 트 윈 도우 (Conte xt Windo w)","explanation":"AI와 대화할 때, AI가 기억할 수 있는 대화 길이의 한계를 말합니다. 예를 들어 컨텍스트 윈도 가 4,000토큰이면, 그 이상의 대화는 앞부분을 잊어버립니다."},{"id":302,"type":"sa","text":"정답 데이터가 없는 대량의 정보에서 스스로 특징과 패턴을 찾아내는 학습 방식은?","answer":"비지도 학습","explanation":"비지도 학습(Unsupervised Learning)은 정답 없이 데이터만 주고 AI가 스스로 그룹이나 패턴 을 찾게 하는 방식입니다. 고객 분류, 이상 탐지 등에 활용됩니다."},{"id":303,"type":"sa","text":"AI 모델 학습 시 과적합을 방지하기 위해 일부 뉴런을 무작위로 비활성화하는 기법은?","answer":"드롭아 웃 (Drop out)","explanation":"드롭아웃(Dropout)은 학습 중 일부 뉴런을 랜덤으로 꺼서, AI가 특정 경로에만 의존하지 않게 하는 기법입니다. 시험 대비 시 한 과목만 파지 않고 골고루 공부하는 것과 비슷합니다."},{"id":306,"type":"sa","text":"AI가 카메라나 센서로 촬영한 이미지·동영상 속 물체를 인식하고, 위치·형태·움직임까지 분석 하는 기술을 무엇이라고 하나요?","answer":"컴퓨터 비전","explanation":"컴퓨터 비전(Computer Vision)은 AI가 사람의 시각처럼 이미지나 영상 데이터를 이해·분석하 는 기술 분야입니다. 대표적인 세부 기술로는 이미지 분류(Classification), 객체 탐지(Object Detection), 영역 분할(Segmentation), 자세 추정(Pose Estimation) 등이 있습니다. 자율주행 차량의 보행자·신호등 인식, 건설 현장 CCTV의 안전모 미착용자 감지, 제조 라인의 불량품 검 출, 의료 영상(X-ray·CT) 판독 등에 널리 활용됩니다. 딥러닝, 특히 CNN(합성곱 신경망)의 발 전으로 인식 정확도가 비약적으로 향상되었습니다."},{"id":307,"type":"sa","text":"GPT-4는 약 1조 8천억 개, LLaMA-3는 700억 개 등 AI 모델의 규모를 나타낼 때 사용하는, 모델 내부에서 학습을 통해 조정되는 수치 변수를 무엇이라 하나요?","answer":"파라미 터","explanation":"파라미터(Parameter)란 AI 모델 내부에서 학습을 통해 자동으로 조정되는 수치 변수입니다. 사람의 뇌에서 신경 세포 간 연결 강도가 경험을 통해 강화되는 것처럼, AI도 데이터를 반복 학습하면서 파라미터 값을 조금씩 조정해 정확도를 높여갑니다. [파라미터 수와 모델 규모] AI 모델의 성능을 나타내는 대표적 지표로, 파라미터가 많을수록 더 복잡한 패턴을 학습할 수 있습니다. • GPT-3: 약 1,750억 개 • GPT-4: 약 1조 8,000억 개 (추정) • LLaMA-3 (메타): 80억 ~ 700억 개 다만 파라미터가 무조건 많다고 좋은 것은 아닙니다. 파라미터가 많을수록 학습에 필요한 데 이터와 컴퓨팅 비용도 기하급수적으로 증가하며, 적은 파라미터로도 효율적으로 성능을 내는 경량화 기술도 활발히 연구되고 있습니다. 참고로 파라미터는 모델이 학습 중 '자동으로' 조정하는 값이고, 사람이 학습 전에 '직접 설정' 하는 값(학습률, 배치 크기 등)은 '하이퍼파라미터(Hyperparameter)'라고 구분합니다."},{"id":308,"type":"sa","text":"AI 모델은 학습 과정에서 정답과 예측값의 차이(오차)를 수치로 측정하고, 이 값을 최소화하 는 방향으로 학습합니다. 이때 오차를 계산하는 기준이 되는 함수를 무엇이라 하는가?","answer":"손실함 수 (또 는 Loss Functi on)","explanation":"손실함수(Loss Function)는 AI 모델이 예측한 값과 실제 정답 사이의 차이(오차)를 수치로 표 현하는 함수입니다. 손실값이 클수록 모델이 많이 틀렸다는 의미이며, AI는 이 손실값을 최소 화하는 방향으로 파라미터(가중치)를 반복적으로 업데이트하며 학습합니다. 쉽게 비유하면, 시험에서 틀린 문제를 확인하고 다음에 더 잘 풀기 위해 공부 방향을 조정하는 것과 같은 원 리입니다."},{"id":311,"type":"sa","text":"개인정보 보호를 위해 데이터를 한 곳에 모으지 않고, 각 기기(단말)에서 학습한 결과(모델 파라미터)만 중앙 서버에 공유하여 하나의 AI 모델을 만드는 분산 학습 방식을 무엇이라 하 는가?","answer":"연합학 습 (또 는 Feder ated Learni ng)","explanation":"연합학습(Federated Learning)은 데이터를 중앙 서버로 전송하지 않고, 각 기기(병원, 현장, 단 말 등)에서 로컬 데이터로 학습한 후 학습 결과(모델 파라미터)만 중앙에 공유하여 하나의 글 로벌 모델을 만드는 분산 학습 방식입니다. 원본 데이터가 외부로 유출되지 않아 개인정보 보 호가 중요한 의료·금융 분야에서 활발히 활용되며, 건설업에서도 각 현장의 안전 데이터를 공 유하지 않으면서 AI 모델을 공동 개선하는 데 적용할 수 있습니다."},{"id":312,"type":"sa","text":"대규모 데이터로 사전 학습되어 다양한 하위 작업의 '기반(토대)'이 되는 AI 모델을 무엇이라 하는가? GPT, BERT, Claude 등이 이에 해당하며, 파인튜닝을 통해 특정 도메인에 맞게 조정 할 수 있다. (힌트: '기반' 또는 '토대'를 의미하는 영어 단어)","answer":"파운데 이션 모델 (또는 Found ation Model )","explanation":"파운데이션 모델(Foundation Model)은 방대한 양의 텍스트·이미지·코드 등의 데이터로 사전 학습되어, 특정 작업에 국한되지 않고 번역·요약·코딩·대화 등 다양한 하위 작업의 '토대(기반)' 가 되는 대규모 AI 모델입니다. 생성형 AI와의 차이점은, 생성형 AI는 '새로운 콘텐츠를 만들 어내는 능력'을 강조하는 개념이고, 파운데이션 모델은 '다양한 작업의 기반이 되는 모델 구 조'를 의미합니다. 예를 들어 GPT는 파운데이션 모델이면서 동시에 생성형 AI이기도 합니다. 이러한 파운데이션 모델에 파인튜닝(Fine-tuning)이나 LoRA 등의 기법을 적용하면 건설 전문 용어, 사내 규정 등 특정 분야에 맞게 추가 조정할 수 있습니다."},{"id":313,"type":"sa","text":"프롬프트 앞에 \"당신은 10년 경력의 건설 전문가입니다\"처럼 AI에게 특정 역할을 부여하는 기법을 무엇이라고 하나요?","answer":"역할 부여, 페르소 나 부 여","explanation":"Role Prompting이라고도 합니다. AI에게 역할을 명확히 부여하면 해당 분야에 특화된 더 전 문적인 답변을 얻을 수 있습니다."},{"id":315,"type":"sa","text":"AI가 입력 데이터에서 중요한 부분에 더 집중하도록 가중치를 부여하는 기법을 무엇이라고 하나요? (힌트: 트랜스포머의 핵심 구성 요소)","answer":"어텐션","explanation":"어텐션(Attention)은 AI가 입력 데이터의 모든 부분을 동일하게 처리하지 않고, 현재 작업과 관련성이 높은 부분에 더 큰 가중치를 부여해 집중하는 기법입니다. 예를 들어 \"나는 오늘 회 사에서 점심을 먹었다\"를 번역할 때, '점심'이라는 단어를 처리하면서 '먹었다'에 더 높은 가중 치를 부여하는 방식입니다. 2017년 구글의 논문 \"Attention Is All You Need\"에서 제안된 트 랜스포머(Transformer) 구조의 핵심 요소이며, 특히 셀프 어텐션(Self-Attention)은 입력 문장 내 단어들 간의 관계를 파악합니다. GPT, BERT 등 현재 대부분의 대형 언어모델(LLM)이 이 어텐션 메커니즘을 기반으로 작동합니다."},{"id":316,"type":"sa","text":"AI 모델의 전체 학습 데이터를 한 번 완전히 학습하는 횟수 단위를 무엇이라고 하나요?","answer":"에포크","explanation":"에포크(Epoch)는 모델이 전체 학습 데이터를 처음부터 끝까지 한 번 학습하는 것을 의미합니 다. 적절한 에포크 수 설정이 과적합·과소적합 방지에 중요합니다."},{"id":317,"type":"sa","text":"AI 학습에서 손실을 최소화하기 위해 파라미터를 업데이트하는 속도를 결정하는 값을 무엇 이라고 하나요?","answer":"학습률","explanation":"Learning Rate라고도 합니다. 학습률이 너무 크면 최적값을 지나치고, 너무 작으면 학습이 매 우 느려집니다."},{"id":318,"type":"sa","text":"AI 모델의 성능을 평가할 때, 정밀도(Precision)와 재현율(Recall)의 조화 평균을 하나의 수치 로 나타내는 지표를 뭐라고 하나요? (힌트: 영어 알파벳+숫자 조합)","answer":"F1 스 코어","explanation":"F1 스코어(F1 Score)는 정밀도(Precision)와 재현율(Recall)의 조화 평균으로, 두 지표 사이의 균형을 하나의 수치(0~1)로 나타냅니다. 정밀도는 'AI가 양성이라고 예측한 것 중 실제로 양 성인 비율', 재현율은 '실제 양성 중 AI가 양성으로 찾아낸 비율'을 의미합니다. 예를 들어 건 설 현장에서 AI가 균열을 탐지할 때, 정밀도가 높으면 '균열이다'라고 판단한 것이 대부분 맞 지만 놓치는 균열이 많고, 재현율이 높으면 균열을 거의 다 찾지만 오탐도 많아집니다. F1 스 코어는 이 둘의 균형을 평가하며, 특히 데이터가 불균형한 경우(예: 균열 있는 이미지 5% vs 정상 95%) 단순 정확도(Accuracy) 대신 F1 스코어를 사용하는 것이 더 적절합니다."},{"id":320,"type":"mc","text":"AI 신경망에서 어떤 값이든 0과 1 사이의 확률로 변환해주는 S자 모양의 활성화 함수는?","answer":"시그모이드(Sigmoid)","explanation":"시그모이드(Sigmoid) 함수는 어떤 수치든 0과 1 사이의 값으로 압축하는 S자 모양의 함수입 니다. 출력값을 '확률'로 해석할 수 있어, 이진 분류(예/아니오, 스팸/정상 등) 문제에 많이 사 용됩니다. 예를 들어 이메일이 스팸일 확률을 판단할 때, 시그모이드 출력이 0.95면 \"스패 확률 95%\"로 해석합니다. 2번 렛루(ReLU)는 음수를 0으로 바꾸는 함수로 딥러닝에서 가장 널리 사용, 3번 소프트맥스 는 여러 클래스 중 하나를 고를 때(다중 분류) 사용, 4번 탄젠트는 -1~1 사이로 변환하는 함수 입니다.","options":["시그모이드(Sigmoid)","렛루(ReLU)","소프트맥스(Softmax)","탄젠트(Tanh)"]},{"id":322,"type":"mc","text":"CCTV에서 사람을 인식하거나, 건설 현장에서 안전모 미착용자를 자동 감지하는 것처럼, AI 가 이미지 속 물체의 위치를 사각형으로 표시해주는 기술은?","answer":"객체 탐지(Object Detection)","explanation":"객체 탐지(Object Detection)는 AI가 이미지나 영상 속에서 특정 물체가 '무엇인지(분류)' + ' 어디에 있는지(위치)'를 동시에 파악하는 기술입니다. 화면에서 물체를 사각형(Bounding Box) 으로 표시해줍니다. [실제 활용 사례] • 건설 현장: 안전모·안전조끼 미착용 근로자 자동 감지 • 자율주행: 차량·보행자·신호등 실시간 인식 • 물류: 컨베이어 위 불량품 자동 선별 1번 이미지 분류는 사진 전체를 '고양이/개' 등으로 구분하는 것(위치 파악 없음), 3번 세그멘 테이션은 픽셀 단위로 영역을 나누는 더 정밀한 기술, 4번 엣지 컴퓨팅은 데이터를 현장 기기 에서 처리하는 방식입니다.","options":["이미지 분류(Image Classification)","객체 탐지(Object Detection)","이미지 세그멘테이션(Image Segmentation)","엣지 컴퓨팅(Edge Computing)"]},{"id":324,"type":"mc","text":"자율주행 차량이 도로·보행자·건물을 픽셀 단위로 정밀하게 구분하거나, 의료 AI가 CT 영상 에서 병변 부위를 정확히 잘라내는 기술은?","answer":"이미지 세그멘테이션(Image Segmentation)","explanation":"이미지 세그멘테이션(Image Segmentation)은 이미지의 각 픽셀이 어떤 객체에 속하는지 분 류하는 기술입니다. 객체 탐지가 사각형으로 대략적인 위치를 표시한다면, 세그멘테이션은 물체의 정확한 윤곽선까지 픽셀 단위로 구분합니다. [실제 활용 사례] • 자율주행: 도로·차선·보행자·건물 등을 픽셀 단위로 정밀 구분 • 의료: CT·MRI 영상에서 종양·병변 부위를 정확히 잘라냄 • 건설: 드론 촬영 영상에서 콘크리트 균열 부위를 정밀 식별 [비슷한 기술 비교] • 이미지 분류: 사진 전체를 '고양이/개' 등 하나로 분류 (가장 단순) • 객체 탐지: 물체의 위치를 사각형으로 표시 (중간) • 세그멘테이션: 픽셀 단위로 영역 구분 (가장 정밀) 즉, 분류 → 탐지 → 세그멘테이션 순서로 점점 더 정밀해지는 기술입니다.","options":["이미지 분류(Image Classification)","객체 탐지(Object Detection)","이미지 세그멘테이션(Image Segmentation)","이미지 생성(Image Generation)"]},{"id":327,"type":"ox","text":"Attention 메커니즘은 입력 시퀀스의 모든 부분에 동일한 가중치를 부여한다.","answer":"X","explanation":"Attention은 AI가 문장을 읽을 때 모든 단어에 똑같이 집중하는 것이 아니라, 중요한 단어에 더 집중하는 기술입니다. 따라서 '모든 부분에 동일한 가중치를 부여한다'는 틀린 설명입니다."},{"id":330,"type":"ox","text":"벡터 DB는 텍스트 임베딩 값을 저장하고 AI가 검색하는 데 최적화되어 있다.","answer":"O","explanation":"RAG 기술 구현 시 가장 유사한 지식 정보를 빠르게 찾아 답변에 활용하게 돕습니다."},{"id":331,"type":"ox","text":"LLM의 성능 지표인 MMLU는 57개 분야에 걸친 모델의 언어 이해 능력을 측정한다.","answer":"O","explanation":"MMLU(Massive Multitask Language Understanding)는 인문, 사회, STEM 등 57개 분야의 객 관식 문제를 통해 LLM의 종합적인 언어 이해 및 추론 능력을 평가하는 벤치마크입니다."},{"id":337,"type":"ox","text":"과소적합(Underfitting)은 AI 모델이 학습 데이터조차 제대로 학습하지 못한 상태다.","answer":"O","explanation":"과적합(너무 외움)의 반대 개념입니다. 모델이 너무 단순하거나 학습이 부족할 때 발생합니 다. 마치 공부를 너무 안 해서 쉬운 문제도 못 푸는 상태입니다."},{"id":340,"type":"ox","text":"강화학습에서 \"보상 함수(Reward Function)\"는 AI가 올바른 방향으로 학습하도록 목표를 설정하는 핵심 요소다.","answer":"O","explanation":"보상 함수를 잘못 설계하면 AI가 의도하지 않은 방식으로 목표를 달성하려 합니다. 예를 들어 \"점수 극대화\"가 목표면 게임을 정직하게 플레이하는 대신 버그를 악용할 수 있습니다."},{"id":343,"type":"ox","text":"AI 모델의 \"온도(Temperature)\" 파라미터를 높이면 더 창의적이고 예측 불가능한 출력이 나 온다.","answer":"O","explanation":"Temperature가 낮으면 확률이 높은 단어만 선택해 안정적이고 반복적인 답변이, 높으면 낮은 확률의 단어도 선택해 다양하고 창의적인 답변이 나옵니다."},{"id":348,"type":"mc","text":"텍스트를 숫자의 나열(벡터)로 변환하여 AI가 문맥상의 의미를 파악하게 하는 기술은?","answer":"임베딩","explanation":"임베딩은 '사과'라는 단어를 [0.2, 0.8, 0.1] 같은 숫자 목록으로 바꾸는 기술입니다. 이렇게 하 면 AI가 '사과'와 '배'가 과일이라는 점에서 비슷하다는 것을 이해할 수 있게 됩니다.","options":["임베딩","인코딩","디코딩","마스킹"]},{"id":351,"type":"mc","text":"AI 모델에서 학습률(Learning Rate)이 너무 높을 때 발생할 수 있는 문제는?","answer":"발산(수렴 실패)","explanation":"학습률이 너무 높으면 최적점을 지나쳐 발산하게 되어 모델이 수렴하지 못합니다.","options":["학습 속도 저하","과소적합","발산(수렴 실패)","메모리 부족"]},{"id":353,"type":"mc","text":"AI 연산에 최적화된 구글의 독자적인 가속기(칩) 명칭은?","answer":"TPU","explanation":"TPU(Tensor Processing Unit)는 구글이 AI 연산을 위해 직접 설계한 전용 칩입니다. 테서(행 렬) 연산에 특화되어 구글 검색, 번역, Gemini 등의 AI 서비스를 구동합니다. 참고로 GPU는 엔비디아의 범용 AI 반도체, NPU는 스마트폰 등 기기 내 AI 연산 전용 칩입니다. AI 반도체 경 쟁은 현재 글로벌 기술 패권의 핵심 이슈입니다.","options":["GPU","TPU","NPU","APU"]},{"id":356,"type":"mc","text":"노코드 기반의 데이터 분석 과정을 통합 관리하는 플랫폼 명칭은?","answer":"Dataiku","explanation":"데이터 전처리부터 AI 모델 배포까지 통합 지원하는 엔터프라이즈용 플랫폼입니다.","options":["Dataiku","Slack","Zoom","Notion"]},{"id":359,"type":"mc","text":"엣지 AI(Edge AI)의 장점으로 가장 적절한 것은?","answer":"인터넷 없이도 작동하고 데이터를 외부로 보내지 않아 보안에 유리하다","explanation":"엣지 AI는 기기 자체에서 연산하므로 인터넷 단절 상황에서도 작동하고, 민감한 데이터를 외 부로 전송하지 않아 개인정보 보호에 유리합니다.","options":["클라우드보다 항상 성능이 뛰어나다","인터넷 없이도 작동하고 데이터를 외부로 보내지 않아 보안에 유리하다","비용이 전혀 들지 않는다","모든 종류의 AI 모델을 실행할 수 있다"]},{"id":361,"type":"mc","text":"연합학습(Federated Learning)이 특히 유용한 분야는?","answer":"환자 데이터를 외부로 보내지 않고 의료 AI를 학습시킬 때","explanation":"병원들이 환자 데이터를 서로 공유하지 않고도 각 병원에서 학습한 결과만 합쳐 공동 AI 모델 을 만들 수 있습니다.","options":["대용량 이미지 처리","환자 데이터를 외부로 보내지 않고 의료 AI를 학습시킬 때","AI 모델의 파라미터를 빠르게 늘릴 때","GPU 성능을 극대화할 때"]},{"id":364,"type":"mc","text":"다음 중 트랜스포머(Transformer) 구조의 핵심 혁신은?","answer":"셀프 어텐션(Self-Attention) 메커니즘","explanation":"트랜스포머는 순환 구조 없이 셀프 어텐션을 통해 문장 내 모든 단어 간의 관계를 동시에 계 산합니다. 이 덕분에 병렬 처리가 가능해 학습 속도가 크게 향상됐습니다.","options":["합성곱 연산","순환 구조","셀프 어텐션(Self-Attention) 메커니즘","결정 트리"]},{"id":365,"type":"mc","text":"AI 모델에서 \"과소적합(Underfitting)\"을 해결하는 방법으로 적절한 것은?","answer":"모델 복잡도 높이기 또는 학습 데이터 늘리기","explanation":"과소적합은 모델이 너무 단순하거나 학습이 부족할 때 발생합니다. 더 복잡한 모델 구조 사 용, 학습 데이터 확대, 에포크 증가 등이 해결책입니다.","options":["드롭아웃 비율 높이기","모델 복잡도 높이기 또는 학습 데이터 늘리기","학습 에포크 줄이기","데이터를 줄이기"]},{"id":367,"type":"mc","text":"\"강화학습\"에서 AI 에이전트가 학습하는 방법으로 옳은 것은?","answer":"행동의 결과로 받는 보상 신호를 통해 최적 정책을 학습","explanation":"강화학습은 정답 데이터 없이 환경과 상호작용하며 보상을 극대화하는 행동 정책을 학습합니 다. 1번은 지도학습, 3번은 비지도학습, 4번은 전이학습입니다.","options":["정답 데이터를 받아서 학습","행동의 결과로 받는 보상 신호를 통해 최적 정책을 학습","유사 데이터끼리 묶어 패턴 발견","큰 모델의 지식을 이전받아 학습"]},{"id":368,"type":"mc","text":"\"하이퍼파라미터(Hyperparameter)\"란 무엇인가?","answer":"학습 전 사람이 설정하는 학습률·배치 크기 등의 외부 설정값","explanation":"파라미터는 학습으로 자동 조정되지만, 하이퍼파라미터는 학습 시작 전 사람이 직접 정해야 하는 학습률·에포크 수·배치 크기 등의 설정값입니다.","options":["학습을 통해 AI 스스로 조정하는 내부 변수","학습 전 사람이 설정하는 학습률·배치 크기 등의 외부 설정값","학습 데이터의 크기","AI 모델이 출력하는 최종 답변"]},{"id":369,"type":"sa","text":"AI 모델이 생성한 여러 답변을 사람이 평가하고, 그 피드백을 반영하여 보다 안전하고 유용한 답변을 하도록 강화학습시키는 훈련 방법의 영어 약자는? (힌트: 영어 약자 4글자이며, ChatGPT 훈련에 사용된 핵심 기술)","answer":"RLHF","explanation":"RLHF(Reinforcement Learning from Human Feedback, 인간 피드백 기반 강화학습)는 AI를 더 안전하고 유용하게 만드는 핵심 훈련 방법입니다. 쉽게 비유하면, 신입 사원이 보고서를 쓸 때 상사가 \"A안보다 B안이 더 좋아\"라고 피드백을 주면, 다음부터 B안 방향으로 개선하는 것과 같습니다. 구체적인 과정은 ①AI가 답변을 여러 개 생성 → ②사람이 답변의 품질을 비 교·평가 → ③평가 데이터로 보상 모델(Reward Model)을 학습 → ④보상 모델을 기준으로 AI 를 강화학습시키는 4단계로 진행됩니다. ChatGPT가 부적절하거나 위험한 답변을 줄이고, 더 정확하고 유용한 답변을 하도록 훈련된 핵심 기술이 바로 RLHF입니다."},{"id":370,"type":"sa","text":"딥러닝에서 신경망의 층이 깊어질수록 오차를 줄이기 위한 학습 신호(기울기)가 앞쪽 층으로 전달될수록 점점 작아져 학습이 제대로 이루어지지 않는 현상을 뭐라고 하나요?","answer":"기울기 소실","explanation":"기울기 소실(Vanishing Gradient)은 신경망의 층이 깊어질수록 오차역전파(Backpropagation) 과정에서 기울기(미분값)가 0에 가까워져 앞쪽 층의 가중치가 거의 업데이트되지 않는 현상 입니다. 쉽게 비유하면 '전화기 게임'과 비슷합니다. 10명이 줄줄이 메시지를 전달하면 맨 앞 사람에게는 원래 메시지가 거의 도달되지 않는 것처럼, 뒤쪽 층의 학습 신호가 앞쪽 층에 도 달하지 못합니다. 이 문제를 해결하기 위해 ① ReLU 활성화 함수(시그모이드 대신 사용하여 기울기가 0으로 수렴하는 것을 방지), ② 배치 정규화(Batch Normalization, 각 층의 입력을 정규화하여 학습 안정화), ③ 스킵 커넥션(Skip Connection, ResNet이 도입한 기법으로 기울 기를 직접 전달) 등의 기법이 개발되었습니다. 반대로 기울기가 급격히 커지는 현상은 '기울 기 폭발(Exploding Gradient)'이라고 합니다."},{"id":371,"type":"sa","text":"GPT와 같은 대규모 AI 모델을 건설, 법률 등 특정 분야의 데이터로 추가 학습시켜 해당 영역 에 더 적합하게 조정하는 과정을 뭔라고 하나요? (힌트: '미세 조정'이라는 뜻의 영어 단어)","answer":"파인튜 닝","explanation":"파인튜닝(Fine-tuning)은 이미 대규모 데이터로 사전 학습된 AI 모델(파운데이션 모델)을 특정 분야의 데이터로 추가 학습시켜 해당 영역에 맞게 조정하는 과정입니다. 쉽게 비유하면, 종합 병원 의사(범용 모델)가 심장 전문의 추가 연수를 받아 심장 전문의(파인튜닝된 모델)가 되는 것과 같습니다. 예를 들어 GPT를 건설 전문 용어·시방서·도면 데이터로 파인튜닝하면 건설 특 화 AI가 됩니다. 처음부터 학습시키는 것보다 적은 데이터와 비용으로 전문성을 높일 수 있는 것이 장점입니다. 참고로 전체 모델이 아닌 일부 파라미터만 조정하는 효율적인 방법으로 LoRA(Low-Rank Adaptation) 같은 기법도 널리 사용됩니다."},{"id":372,"type":"sa","text":"대량의 데이터 속에서 숨겨진 패턴·규칙·상관관계를 찾아내어 의미 있는 정보를 발굴하는 기 술을 무엇이라 하나요? (힌트: 광산에서 금을 캐듯, 데이터에서 가치를 '캐다')","answer":"데이터 마이닝","explanation":"데이터 마이닝(Data Mining)은 대규모 데이터 속에서 통계학·머신러닝·패턴 인식 기법을 활용 해 숨겨진 패턴과 의미 있는 정보를 발굴하는 기술입니다. '마이닝(Mining, 채굴)'이라는 이름 은 광산에서 금을 캠듯, 데이터 속에서 가치 있는 정보를 '캠어낸다'는 의미에서 유래했습니 다. [실제 활용 사례] • 유통: 고객 구매 패턴 분석 → 맞춤형 상품 추천 (예: \"이 상품을 산 고객은 이것도 구매했습 니다\") • 금융: 이상 거래 탐지 → 신용카드 사기 방지 • 의료: 환자 진료 데이터 분석 → 질병 발생 패턴 예측 • 건설: 과거 공사 데이터에서 안전사고 패턴 발굴 → 사고 예방 [유사 개념 구분] • 데이터 마이닝: 데이터에서 패턴·규칙을 '발견'하는 것에 초점 • 빅데이터 분석: 대용량 데이터를 수집·저장·처리하는 전체 과정 (데이터 마이닝을 포함) • 머신러닝: 데이터를 학습해 예측 모델을 '만드는' 것에 초점"},{"id":373,"type":"sa","text":"AI 모델이 외부 시스템(사내 데이터베이스, 업무 도구, API 등)과 표준화된 방식으로 연결되 어 실시간으로 데이터를 주고받을 수 있게 해주는 개방형 연결 규약의 약자는? 38 / 67","answer":"MCP","explanation":"MCP(Model Context Protocol)는 AI 모델이 외부 도구·데이터베이스·업무 시스템과 표준화된 방식으로 연결되도록 하는 개방형 프로토콜입니다. 예를 들어 P-GPT에 MCP를 연계하면, AI 가 사내 공정 관리 시스템이나 문서 저장소에 직접 접근하여 필요한 정보를 실시간으로 가져 와 답변할 수 있습니다."},{"id":374,"type":"sa","text":"저화질의 흐릿한 사진이나 영상을 AI가 분석하여 고화질로 선명하게 복원해주는 기술을 뭔 라 하는가?","answer":"업스케 일링","explanation":"업스케일링(Upscaling)은 AI가 저해상도 이미지의 부족한 부분을 추론하여 고해상도로 복원 하는 기술입니다. 예를 들어 현장에서 찍은 흐릿한 CCTV 영상이나 드론 사진을 AI로 선명하 게 복원하여 균열이나 결함을 더 정확히 확인할 수 있습니다."},{"id":377,"type":"sa","text":"AI가 외부 데이터를 검색해 최신 정보를 답변에 반영하는 방식의 약자는?","answer":"RAG","explanation":"Retrieval-Augmented Generation의 약자입니다. 회사 내부 문서를 AI가 검색해 답변하는 사 내 챗봇이 대표적인 활용 사례입니다."},{"id":381,"type":"sa","text":"AI 모델이 학습 데이터에 지나치게 맞춰져서 새로운 데이터에 약해지는 것(과적합)을 방지하 기 위해, 학습 중 신경망의 일부 노드를 무작위로 꺼는 기법을 뭐라고 하나요? (힌트: '탈락'이 라는 뜻의 영어 단어) 39 / 67","answer":"드롭아 웃","explanation":"드롭아웃(Dropout)은 신경망 학습 중 일부 노드(뉴런)를 무작위로 꺼서 과적합(Overfitting)을 방지하는 기법입니다. 쉽게 비유하면, 조별 과제를 할 때 특정 한 명에게만 의존하면 그 사람 이 빠졌을 때 조별이 망하지만, 매번 랜덤으로 조원을 바꾸면 모든 조원이 독립적으로 역량을 키우는 것과 같습니다. 과적합이란 AI가 학습 데이터는 완벽하게 맞히지만 새로운 데이터에 는 성능이 떨어지는 현상으로, 시험 문제만 달달 외웠는데 실전 응용을 못 하는 것과 같습니 다. 드롭아웃은 예를 들어 50% 비율로 설정하면 매 학습 단계마다 뉴런의 절반을 무작위로 비활성화하여, 모델이 특정 뉴런에 의존하지 않고 더 일반적인 패턴을 학습하도록 유도합니 다. 2012년 제프리 힌턴 교수 팀이 제안한 기법으로, 현재 대부분의 딥러닝 모델에서 기본적 으로 사용되고 있습니다."},{"id":382,"type":"sa","text":"신경망(Neural Network)의 각 노드에서 입력값을 받아 출력값을 결정하며, 모델에 비선형성 을 부여하는 수학 함수를 무엇이라 하는가?","answer":"활성화 함수 (또는 Activa tion Functi on)","explanation":"활성화 함수(Activation Function)는 신경망의 각 노드에서 입력값의 합을 받아 출력값을 결 정하는 수학 함수입니다. 활성화 함수가 없으면 신경망은 단순한 선형 계산만 가능하여 복잡 한 패턴을 학습할 수 없습니다. 활성화 함수가 비선형성을 추가해 주기 때문에 AI가 이미지 인식, 음성 처리, 자연어 이해 등 복잡한 문제를 해결할 수 있습니다. 대표적인 활성화 함수로 는 ReLU(딥러닝에서 가장 널리 사용), Sigmoid(확률 출력), Softmax(다중 클래스 분류) 등이 있습니다."},{"id":384,"type":"sa","text":"임베딩 벡터를 저장하고 의미적 유사도 검색에 최적화된 데이터베이스를 무엇이라고 하나 요?","answer":"벡터 데이터 베이스","explanation":"RAG 시스템에서 문서를 벡터로 저장하고 질문과 가장 유사한 문서를 찾는 데 사용됩니다. Pinecone, Chroma, Weaviate 등이 대표적입니다."},{"id":385,"type":"sa","text":"거대한 AI 모델(교사 모델)의 지식을 작은 모델(학생 모델)에 이전하여, 성능은 유지하면서 크기와 비용을 줄이는 경량화 기법을 무엇이라 하나요? (힌트: 술을 증류하듯 핵심만 추출)","answer":"지식 증류","explanation":"지식 증류(Knowledge Distillation)는 거대한 AI 모델(교사 모델, Teacher Model)의 지식을 작 은 모델(학생 모델, Student Model)에 이전하여, 성능은 최대한 유지하면서 모델 크기와 연산 비용을 대폭 줄이는 기법입니다. [원리 - 증류 비유] 술을 증류할 때 원액에서 핵심 성분(알코올)만 추출하듯, 거대 AI 모델에서 핵심 지식만 추출 하여 작은 모델에 압축하는 것입니다. [작동 방식] ① 거대한 교사 모델이 문제를 풀면서 \"정답 + 사고 과정(확률 분포)\"을 보여줌 ② 작은 학생 모델이 정답뿐 아니라 교사의 사고 과정까지 함께 학습 ③ 결과적으로 작은 모델이 큰 모델에 근접한 성능을 냄 [왜 중요한가?] GPT-5 같은 초거대 모델은 운영에 막대한 컴퓨팅 비용이 필요합니다. 지식 증류를 통해 성능 을 유지하면서도 스마트폰이나 엣지 기기에서 돌아갈 수 있는 경량 모델을 만들 수 있어, 건 설 현장 등 인터넷이 불안정한 환경에서도 AI를 활용할 수 있게 해줍니다."},{"id":386,"type":"sa","text":"AI 모델이 배포된 후 시간이 지나면서 실제 데이터의 분포가 학습 당시의 데이터와 달라져 모델 성능이 점점 저하되는 현상을 무엇이라 하는가?","answer":"데이터 드리프 트 (또 는 Data Drift)","explanation":"데이터 드리프트(Data Drift)란 AI 모델이 학습한 데이터의 통계적 분포와 실제 운영 환경의 데이터 분포가 시간이 지남에 따라 달라지는 현상입니다. 예를 들어, 자재 가격 급등, 기후 변 화로 인한 공정 조건 변화, 소비자 트렌드 변화 등이 발생하면 기존 모델의 예측 정확도가 떨 어집니다. 이를 방지하기 위해 모델 성능을 지속적으로 모니터링하고, 성능 저하가 감지되면 최신 데이터로 재학습(Re-training)하는 MLOps 체계를 구축하는 것이 중요합니다."},{"id":387,"type":"sa","text":"악의적인 프롬프트로 AI의 안전 장치나 기존 규칙을 우회하도록 유도하는 공격 방식은?","answer":"프롬프 트 인 젝션","explanation":"Prompt Injection이라고도 합니다. \"이전 지시를 무시하고...\"처럼 AI가 원래 규칙을 어기도록 유도하는 공격입니다. AI 시스템 보안의 중요한 취약점입니다."},{"id":388,"type":"sa","text":"AI 다중 분류 모델에서, 각 클래스에 속할 확률을 0~1 사이로 변환하고 모든 확률의 합이 1 이 되도록 정규화하는 활성화 함수는?","answer":"소프트 맥스","explanation":"Softmax 함수는 다중 분류(Multi-class Classification) 문제에서 출력층에 사용되는 활성화 함 수입니다. 입력값을 지수 함수로 변환한 뒤 전체 합으로 나누어, 각 클래스에 속할 확률을 0~1 사이로 출력합니다. 예를 들어 이미지 분류에서 고양이 60%, 강아지 30%, 새 10%처럼 확률 분포를 출력합니다."},{"id":389,"type":"ox","text":"인공지능 분야의 '정렬(Alignment)' 기술은 데이터를 크기나 날짜 순서대로 나열하여 AI 모 델의 데이터베이스 검색 속도를 높이는 최적화 작업을 의미한다.","answer":"X","explanation":"AI 정렬은 데이터 정렬(Sorting)이 아니라, AI의 목표와 행동이 인간의 의도, 윤리, 가치관과 일치(Align)하도록 만드는 과정을 뜻합니다. AI가 위험한 답변을 하지 않고 인간에게 유익하 게 행동하도록 교정하는 'AI 길들이기' 기술입니다."},{"id":391,"type":"mc","text":"트랜스포머 구조에서 단어 간 연관 관계를 수치화하는 기술은?","answer":"셀프 어텐션","explanation":"문장 내 모든 단어가 서로에게 미치는 영향력(가중치)을 계산하여 맥락을 파악하는 핵심 원리 입니다","options":["인코딩","셀프 어텐션","디코딩","풀링"]},{"id":393,"type":"sa","text":"AI 모델의 연산 속도를 높이기 위해 32번bit 부동소수점 데이터를 8bit 정수 형태로 변환하 여 정밀도를 조정하는 기법은 무엇입니까?","answer":"양자화","explanation":"양자화(Quantization)는 모델의 정확도를 최대한 유지하면서도 데이터의 크기를 줄여, 스마트 폰이나 현장 기기(Edge Device) 같은 제한된 환경에서도 AI가 빠르게 작동하도록 만드는 핵 심 기술입니다."},{"id":394,"type":"sa","text":"인공신경망에서 입력값이 0보다 크면 그 값을 그대로 내보내고, 0보다 작으면 0으로 차단하 는 특성을 가진 활성화 함수는 무엇인가? (영어 약자로도 정답 인정)","answer":"ReLU (렐루)","explanation":"ReLU(Rectified Linear Unit)는 현대 딥러닝에서 가장 많이 쓰이는 함수입니다. 비유하자면, \"0 보다 큰 유의미한 정보(양수)만 통과시키고, 불필요한 잡음(음수)은 0으로 만들어 문을 닫아버 리는 똑똑한 문지기\"와 같습니다."},{"id":403,"type":"mc","text":"다음 중 AI를 활용한 영상 편집 서비스로 텍스트만으로 동영상 편집이 가능한 것은?","answer":"Runway","explanation":"Runway는 AI 기반 영상 편집 서비스로, 텍스트 명령만으로 동영상 편집·생성이 가능합니다.","options":["Canva","Runway","Notion","Slack"]},{"id":404,"type":"mc","text":"이미지 편집 시 특정 영역을 지우면 자연스럽게 배경을 채워주는 AI 기술의 명칭은?","answer":"인페인팅(Inpainting)","explanation":"인페인팅(Inpainting)은 이미지의 특정 영역을 지우면 AI가 주변 맥락에 맞게 자연스럽게 채 워주는 기술입니다.","options":["인페인팅(Inpainting)","아웃페인팅","크롭","명암 조절"]},{"id":410,"type":"sa","text":"이미지 속의 글자를 AI가 읽어서 텍스트로 변환해주는 기술의 약자는?","answer":"OCR","explanation":"OCR(Optical Character Recognition, 광학문자인식)은 사진이나 스캔 속 글자를 편집 가능한 텍스트로 변환하는 기술입니다. 예를 들어 건설 현장에서 종이 시공 도면을 카메라로 촬영하 면 OCR이 문자를 인식해 디지털 문서로 변환하고, 명함 사진으로 연락처를 자동 저장하거나, 네이버 영수증 리뷰 작성도 OCR 활용 사례입니다."},{"id":411,"type":"sa","text":"텍스트를 입력하면 이미지를 생성해주는 OpenAI의 서비스 이름은?","answer":"DALL- E","explanation":"최근 버전3 까지 업데이트되어 매우 정교한 이미지를 생성합니다."},{"id":413,"type":"sa","text":"Meta(페이스북)에서 개발한 오픈소스 대규모 언어 모델의 이름은?","answer":"Llama (라마)","explanation":"연구 및 상업적 목적으로 공개되어 많이 활용됩니다."},{"id":414,"type":"sa","text":"ChatGPT, Gemini 등 생성형 AI에게 원하는 결과를 얻기 위해 질문(명령어)의 구조와 표현을 전략적으로 설계하는 기법을 무엇이라 하는가?","answer":"프롬프 트 엔 지니어 링","explanation":"프롬프트 엔지니어링(Prompt Engineering)이란 AI에게 역할(페르소나)을 부여하거나, 단계별 로 사고하도록 유도(Chain of Thought)하거나, 출력 형식을 지정하는 등 프롬프트를 정교하 게 다듬어 AI의 응답 품질을 높이는 기법입니다. 예를 들어, \"요약해줘\"보다 \"핵심 키워드 3개 를 포함해 3문장으로 요약해줘\"라고 지시하면 훨씬 정확한 결과를 얻을 수 있습니다."},{"id":416,"type":"ox","text":"Microsoft Copilot은 엑셀, 파워포인트 등 MS 오피스 앱에 탑재된 AI로, Google이 개발한 Gemini 모델을 기반으로 작동한다.","answer":"X","explanation":"Microsoft Copilot이 MS 오피스 앱에 탑재되어 문서 작성을 돕는 것은 맞지만, 기반 모델이 틀립니다. Copilot은 Google의 Gemini가 아닌 OpenAI의 GPT 모델을 기반으로 작동합니다. Microsoft는 OpenAI에 대규모 투자를 하여 전략적 파트너십을 맺었으며, 이를 통해 GPT-4 등의 모델을 자사 제품에 통합했습니다. 반면 Gemini는 Google이 자사 서비스(Google Workspace, 검색 등)에 활용하는 AI 모델입니다. AI 서비스와 기반 모델의 관계를 정확히 아 는 것이 중요합니다."},{"id":418,"type":"ox","text":"동영상 속 화자의 입모양을 번역된 언어에 맞춰 바꿔주는 AI 기술을 립싱크(Lip-sync)라고 한 다.","answer":"O","explanation":"AI 기반 영상 편집 기술 중 하나입니다."},{"id":426,"type":"mc","text":"회의 내용을 실시간 자막으로 만들거나 기록해주는 AI 서비스가 주로 사용하는 기술은?","answer":"STT","explanation":"STT(Speech-to-Text)는 음성을 텍스트로 변환하는 기술로, 실시간 자막 생성이나 회의록 작 성에 활용됩니다.","options":["STT","TTS","OCR","GAN"]},{"id":428,"type":"mc","text":"AI가 작성한 글을 사람이 수정하고 다듬는 협업 방식을 무엇이라 하는가?","answer":"Human-in-the-Loop","explanation":"Human-in-the-Loop은 AI가 초안을 만들고 사람이 검토·수정하는 협업 방식으로, 품질과 효 율을 모두 확보합니다.","options":["Human-in-the-Loop","완전 자동화","무인 시스템","블랙박스"]},{"id":430,"type":"mc","text":"ChatGPT나 클로드에 엑셀 파일을 업로드한 뒤 \"이 데이터를 분석해줘\"라고 요청하면 AI가 자동으로 통계 요약·차트·이상값 탐지 등을 수행해주는데, 이러한 초기 데이터 탐색 과정을 무엇이라 하는가?","answer":"EDA(Exploratory Data Analysis)","explanation":"EDA(탐색적 데이터 분석)는 데이터의 특성·분포·이상값 등을 시각화하며 파악하는 초기 분석 단계입니다. 최근 ChatGPT나 클로드에 엑셀 파일을 업로드하면 AI가 자동으로 평균·분산·상 관관계 등을 분석하고 차트까지 만들어줘, 코딩 없이도 EDA를 수행할 수 있습니다.","options":["EDA(Exploratory Data Analysis)","ETL(Extract Transform Load)","EPM(Enterprise Performance Management)","ERP(Enterprise Resource Planning)"]},{"id":434,"type":"sa","text":"텍스트를 입력하면 사람의 목소리처럼 자연스럽게 음성으로 변환해주는 AI 기술을 영어 약 자 3글자로 뭐라고 하나요? (힌트: 네비게이션 안내, 오디오북, AI 음성 더빙 등에 활용)","answer":"TTS","explanation":"TTS(Text to Speech, 텍스트 음성 변환)는 텍스트를 사람의 목소리와 유사한 음성으로 변환해 주는 AI 기술입니다. 초기 TTS는 로봇 같은 딱딱한 음성이었지만, 최신 AI 기반 TTS는 억양, 감정, 쉬는 구간까지 자연스럽게 표현하여 실제 사람과 구분하기 어려운 수준에 도달했습니 다. 활용 예시로는 ①네비게이션 음성 안내, ②오디오북 낭독, ③유튜브·틱톡 등 영상 더빙, ④ 시각장애인용 접근성 지원 등이 있습니다. 대표적인 AI TTS 서비스로는 ElevenLabs, 네이버 CLOVA Voice, OpenAI TTS 등이 있습니다. 반대 개념으로 음성을 텍스트로 변환하는 기술은 STT(Speech to Text)라고 합니다."},{"id":437,"type":"ox","text":"LLM(대규모 언어 모델)은 실시간으로 인터넷을 검색하여 최신 정보를 제공한다.","answer":"X","explanation":"LLM(Large Language Model, 대규모 언어 모델)은 학습 시점까지의 데이터만을 기반으로 응 답하므로, 학습 이후에 발생한 사건이나 최신 정보는 알지 못합니다. 이를 '지식 단절 (Knowledge Cutoff)'이라 합니다. 실시간 정보 검색이 필요한 경우에는 ChatGPT의 웹 검색 기능이나 Microsoft Copilot의 Bing 검색 연동이 RAG 방식을 통해 진행합니다."},{"id":439,"type":"ox","text":"LoRA(Low-Rank Adaptation)는 전체 모델을 재학습하지 않고 일부 파라미터만 조정하는 경 량화 기법이다.","answer":"O","explanation":"LoRA(Low-Rank Adaptation)는 대규모 언어 모델(LLM)의 수십억~수천억 개 파라미터 전체를 재학습하지 않고, 소수의 저순위(Low-Rank) 행렬만 추가하여 특정 용도에 맞게 미세 조정 (Fine-Tuning)하는 경량화 기법입니다. 전체 모델을 재학습하는 것 대비 GPU 메모리와 계산 비용을 크게 줄일 수 있어, 기업이 자사 업무 데이터로 맞춤형 AI를 구축할 때 많이 활용됩니 다. 예를 들어, 범용 LLM을 건설 전문 용어나 사내 규정에 특화된 모델로 조정할 때 LoRA를 적용할 수 있습니다."},{"id":440,"type":"ox","text":"페르소나 설정은 AI에게 특정 역할을 부여하는 기법으로, AI의 내부 파라미터를 직접 수정하 여 해당 분야의 전문 지식을 새로 학습시키는 방식이다.","answer":"X","explanation":"페르소나 설정은 AI의 파라미터를 수정하거나 새로운 지식을 학습시키는 것이 아니라, 프롬 프트에 '너는 10년 경력의 건설 전문가야'처럼 역할을 지정하여 AI가 기존에 학습된 지식 중 해당 분야에 적합한 어휘·톤·관점으로 답변하도록 유도하는 프롬프트 엔지니어링 기법입니다. 모델 자체는 변하지 않고, 입력하는 명령어(Role Prompting)만으로 답변 품질을 높이는 방식 입니다."},{"id":444,"type":"ox","text":"오픈소스 모델(Llama 등)은 소스 코드가 공개되어 있으므로 사내 서버에 직접 구축하여 사용 하는 것이 API 방식보다 보안상 더 취약하다.","answer":"X","explanation":"사내망(On-premise)에 구축하면 데이터가 외부 클라우드로 나가지 않으므로 보안성을 비약 적으로 높일 수 있습니다."},{"id":445,"type":"mc","text":"AI 서비스에서 자주 쓰이는 'API'란 무엇의 약자이며, 어떤 역할을 하는가?","answer":"Application Programming Interface","explanation":"API(Application Programming Interface)는 서로 다른 프로그램이 데이터를 주고받을 수 있게 해주는 인터페이스입니다. 예를 들어 ChatGPT API를 연결하면 사내 시스템에서 AI 기능을 바 로 활용할 수 있고, 나라장터 API로 입찰 데이터를 자동 수집하는 것도 가능합니다.","options":["Application Programming Interface","Automated Personal Intelligence","Advanced Protocol Integration","AI Power Input"]},{"id":447,"type":"mc","text":"다음 중 AI를 활용한 실시간 음성 복제 및 더빙 서비스로 유명한 것은?","answer":"ElevenLabs","explanation":"ElevenLabs는 AI 음성 합성 및 복제 서비스로, 소량의 음성 샘플만으로 자연스러운 음성을 생 성할 수 있습니다.","options":["Suno AI","ElevenLabs","Runway","Canva"]},{"id":450,"type":"sa","text":"하나의 AI 모델만 사용하지 않고, 여러 모델의 예측 결과를 종합하여 단일 모델보다 더 높은 정확도를 얻는 기법을 뭐라고 하나요? (힌트: 음악에서 여러 악기가 함께 연주한다는 뜻의 프 랑스어)","answer":"앙상블 (Ense mble)","explanation":"앙상블(Ensemble)은 여러 AI 모델의 예측을 종합하여 단일 모델보다 더 높은 정확도를 얻는 기법입니다. 쉽게 비유하면, 어려운 질병을 진단할 때 한 명의 의사보다 여러 명의 전문의가 함께 판단하면 오진이 줄어드는 것과 같은 원리입니다. 대표적인 앙상블 방법으로는 ①배깅 (Bagging): 데이터를 랜덤으로 나누어 여러 모델을 병렬로 학습한 후 결과를 평균내는 방식 (대표: Random Forest), ②부스팅(Boosting): 이전 모델이 틀린 부분을 다음 모델이 집중적으 로 개선하는 방식(대표: XGBoost, LightGBM), ③스태킹(Stacking): 여러 모델의 결과를 새로운 모델이 다시 학습하는 방식이 있습니다. 앙상블은 Kaggle 등 AI 경진대회에서 상위권 솔루션 에 거의 필수적으로 사용될 만큼 실전에서 효과가 입증된 기법입니다."},{"id":452,"type":"sa","text":"AI가 외부 지식 소스에서 관련 정보를 검색한 뒤, 이를 바탕으로 답변을 생성하는 기술 구조 는?","answer":"RAG 연동","explanation":"RAG(Retrieval-Augmented Generation, 검색 증강 생성)은 사내 문서, DB, 웹 등 외부 지식 소 스에서 관련 정보를 검색하여 AI 답변의 정확도와 신뢰성을 높이는 구조입니다."},{"id":453,"type":"sa","text":"AI 모델이 맥락을 기억하는 한계치로 최근 대폭 확장된 기술은?","answer":"롱 컨 텍스트","explanation":"수만 페이지의 문서를 한꺼번에 입력받아 내용을 분석할 수 있는 능력입니다."},{"id":454,"type":"sa","text":"ChatGPT 등 생성형 AI 내부에 탑재된 기능으로, 사용자가 업로드한 데이터 파일을 분석하거 나 AI가 작성한 코드를 가상 환경에서 직접 실행하여 연산 결과를 도출할 수 있는 기능은?","answer":"코드 인터프 리터","explanation":"코드 인터프리터(Code Interpreter)는 AI가 단순히 텍스트로 답변하는 것을 넘어, 사용자가 업 로드한 엑셀·CSV 파일을 직접 분석하거나, Python 코드를 작성·실행하여 정확한 연산 결과와 차트를 즉시 생성해주는 기능입니다. 예를 들어 매출 데이터를 업로드하면 AI가 스스로 코드 를 짜서 통계 분석과 시각화까지 수행합니다."},{"id":455,"type":"sa","text":"ChatGPT와 같은 생성형 AI에게 원하는 결과를 얻기 위해, 역할 지정·조건 설정·예시 제시 등 으로 질문(명령)을 정교하게 설계하는 기술을 무엇이라고 하나요?","answer":"프롬프 트 엔 지니어 링","explanation":"프롬프트 엔지니어링(Prompt Engineering)은 AI 모델에게 입력하는 프롬프트(질문·명령문)를 체계적으로 설계하여 원하는 품질의 응답을 이끌어내는 기술입니다. 대표적인 기법으로는 ① 역할 지정(예: \"너는 건설 안전 전문가야\"), ② Few-shot 프롬프팅(예시 답변을 먼저 보여주고 동일 형식으로 요청), ③ Chain-of-Thought(단계별 사고 유도), ④ 출력 형식 지정(표, JSON, 불릿 등) 등이 있습니다. 같은 AI 모델이라도 프롬프트를 어떻게 작성하느냐에 따라 결과의 품질이 크게 달라지므로, 생성형 AI를 효과적으로 활용하기 위한 핵심 역량으로 주목받고 있 습니다."},{"id":457,"type":"mc","text":"생성형 AI가 답변을 만들 때, 특정 단어가 나타날 확률을 강제로 높이거나 낮추어 출력을 정 교하게 제어하는 고급 설정값은?","answer":"Logit Bias(로짓 바이어스)","explanation":"정답인 Logit Bias는 특정 단어에 '가중치'를 주어 그 단어가 더 자주 나오게 하거나 아예 나오 지 못하게(차단) 만드는 설정입니다. 비유하자면, 주사위를 던질 때 특정 숫자가 나올 확률을 조작하는 장치와 같습니다. (1.온도는 답변의 무작위성, 3.Top-P는 후보 단어군의 범위를 조절 합니다.)","options":["Temperature(온도)","Logit Bias(로짓 바이어스)","Top-P(핵 샘플링)","Max Tokens(최대 토큰) 47 / 67"]},{"id":459,"type":"sa","text":"ChatGPT 등 대형 언어 모델(LLM)이 텍스트를 생성할 때, 이전까지 생성한 단어들을 바탕으 로 다음 단어를 하나씩 순차적으로 예측하는 생성 방식을 무엇이라 하나요?","answer":"오토리 그레시 브","explanation":"오토리그레시브(Autoregressive, 자기회귀) 방식은 AI가 텍스트를 생성할 때, 이전까지 생성한 단어들을 입력으로 삼아 다음 단어를 하나씩 순차적으로 예측하는 방식입니다. [작동 예시] \"오늘 날씨가\"라는 입력이 주어지면: ① \"오늘 날씨가\" → 다음 단어 예측: \"좋습니다\" (70%), \"맑습니다\" (20%), \"흐립니다\" (10%) ② \"오늘 날씨가 좋습니다\" → 다음 단어 예측: \".\" (60%), \",\" (30%)... 이처럼 한 번에 한 단어씩, 이전 결과를 반영하며 연쇄적으로 생성합니다. [왜 중요한가?] ChatGPT, Gemini, Claude 등 현재 거의 모든 대형 언어 모델(LLM)이 이 방식을 사용합니다. ChatGPT가 답변을 한 글자씩 타이핑하듯 보여주는 것도 이 순차적 생성 방식 때문입니다. 전 체 문장을 한껏번에 만드는 것이 아니라, 단어 하나하나를 순서대로 예측해 나가는 것입니다. '자기회귀(自己回歸)'라는 이름은 '자신이 생성한 결과를 다시 입력으로 되먹여 다음을 예측한 다'는 의미에서 유래했습니다."},{"id":479,"type":"mc","text":"반복적인 사무 업무(데이터 입력, 파일 정리 등)를 소프트웨어 로봇이 자동으로 처리해주는 기술을 뭔라 하는가?","answer":"RPA","explanation":"RPA(Robotic Process Automation)는 데이터 입력, 파일 이동, 이메일 발송 등 반복적인 사무 작업을 소프트웨어가 자동 수행하는 기술입니다. AI와 결합하면 단순 반복 업무뿐 아니라 판 단이 필요한 업무까지 자동화할 수 있습니다.","options":["RPA","ERP","CRM","VPN"]},{"id":483,"type":"mc","text":"착공 후 수행시 프로젝트 실행 예산 및 공정 등 프로젝트 전 과정을 모니터링하고 관리하는 사내 업무시스템 명칭은?","answer":"PRO-Master","explanation":"사업관리시스템(PRO-Master)는 당사 사업 전 과정을 모니터링하고 관리하는 컨트롤 타워입 니다.","options":["BIZ-Master","ESTI-Master","PRO-Master","HR-Master"]},{"id":485,"type":"mc","text":"다음 중 데이터 분석 플랫폼이 아닌 것은?","answer":"3번","explanation":"Slack은 업무용 메신저/협업 툴로, 데이터 분석 플랫폼이 아닙니다. Dataiku는 노코드 기반 AI 플랫폼, Databricks는 대규모 데이터 처리·분석을 위한 통합 레이크하우스 플랫폼, Tableau는 데이터 시각화 및 분석 플랫폼입니다.","options":["Dataiku 2번.Databricks 3번.Slack 4번.Tableau"]},{"id":494,"type":"mc","text":"AI 서비스 도입 시 업체와 체결하는 계약으로, 시스템 가동율·응답 시간·장애 대응 등 서비스 품질 기준을 명시한 것은?","answer":"SLA","explanation":"SLA(Service Level Agreement, 서비스 수준 합의)는 AI 서비스 업체와 체결하는 계약으로, 시 스템 가동율(99.9% 등), 응답 속도, 장애 대응 시간 등 서비스 품질 기준을 명확히 정합니다. AI 솔루션 도입 시 안정적인 운영을 보장받기 위해 필수적입니다.","options":["NDA","MOU","SLA","RFP"]},{"id":500,"type":"sa","text":"AI가 현장 영상을 분석해 아파트 외벽 미세 균열을 자동 탐지하고 데이타화 해주는 포스코이 앤씨의 기술명칭은?","answer":"POS- VISIO N","explanation":"POS-VISION(포스비전)은 포스코이앤씨가 국내 건설사 최초로 개발한 드론 기반 AI 균열관리 솔루션입니다. 고화질 영상장비를 장착한 드론이 아파트 외벽을 촬영하면, AI가 영상을 분석 하여 균열 인식, 저화질 이미지의 고화질 변환, 오탐지 요소 제거 등을 수행합니다. 특히 공동 주택 하자판정기준인 폭 0.3mm 이상의 미세 균열까지 탐지할 수 있으며, 균열의 폭·길이·위 치에 대한 상세정보를 데이터화하여 관리합니다. 균열 외에도 창호 코킹 불량, 콘크리트 파손 등 외벽 품질 하자 전반을 감지할 수 있습니다."},{"id":501,"type":"mc","text":"2026년 1월부터 전면 시행되는 한국의 '인공지능 발전과 신뢰 기반 조성 등에 관한 기본법 (AI기본법)'의 핵심 기조로 가장 알맞은 것은?","answer":"산업 진흥 중심 및 필요 최소한의 규제","explanation":"한국의 AI 기본법은 유럽연합(EU)의 강력한 사전 규제와 달리, AI 산업의 경쟁력을 높이기 위 해 진흥을 우선시하고 규제를 최소화하는 방향으로 제정되었습니다.","options":["전면적인 사전 규제 및 통제 강화","산업 진흥 중심 및 필요 최소한의 규제","오픈소스 AI 개발의 전면 금지","유럽연합(EU)보다 엄격한 제재 수준 도입"]},{"id":502,"type":"mc","text":"AI기본법상 생명, 안전, 기본권에 중대한 영향을 미치는 '고영향 AI(High-Impact AI)' 적용 영역으로 명시되지 않은 것은?","answer":"단순 엔터테인먼트 및 게임","explanation":"고영향 AI는 에너지, 먹는 물, 보건의료, 대출심사, 채용 등 인간의 생명과 안전, 기본권과 직 결되는 10개 분야에 한정되며, 단순 엔터테인먼트나 게임은 인간의 생명이나 기본권에 중대 한 영향을 미치지 않으므로 고영향 AI에 해당하지 않습니다.","options":["의료 및 보건","에너지 및 먹는 물","범죄 수사 및 대출 심사","단순 엔터테인먼트 및 게임"]},{"id":503,"type":"mc","text":"AI기본법에 따른 '투명성 확보(워터마크) 의무'에 대한 설명으로 옳지 않은 것은?","answer":"AI를 도구로 활용해 콘텐츠를 만드는 웹툰 작가나 일반 이용자도 의무 적용 대상에 포함 된다.","explanation":"AI기본법상 투명성 확보 의무는 AI를 직접 개발하거나 서비스하는 '사업자'에게만 적용되며, 일반 크리에이터나 이용자 등은 적용 대상이 아닙니다.","options":["챗봇 등 대화형 서비스 내에서는 UI나 로고 표출 등으로 유연한 표시가 허용된다.","AI를 도구로 활용해 콘텐츠를 만드는 웹툰 작가나 일반 이용자도 의무 적용 대상에 포함 된다.","AI 생성물을 외부로 반출할 때는 가시·가청적 워터마크나 기계가 판독할 수 있는 메타데 이터를 적용해야 한다.","사실과 구분이 어려운 딥페이크 결과물은 이용자가 명확히 인식할 수 있도록 고지해야 한다."]},{"id":504,"type":"mc","text":"EU의 인공지능법(EU AI Act)과 한국의 AI기본법을 비교한 설명으로 틀린 것은?","answer":"한국 AI기본법 위반 시 기업 규모에 따라 전 세계 매출액의 최대 7%에 해당하는 과징금 이 부과된다.","explanation":"한국과 EU는 제재 방식에서 큰 차이가 있습니다. EU AI법은 전 세계 매출액의 최대 7%까지 과징금을 부과하는 반면, 한국 AI기본법은 최대 3,000만 원 이하의 과태료를 부과합니다.","options":["EU AI법은 AI의 위험 수준을 4단계(수용불가, 고위험, 제한적 위험, 저위험)로 세분화하 여 규제한다.","한국의 AI기본법은 국방 또는 국가안보 목적으로 개발된 AI에 대해서는 적용을 제외한 다.","한국 AI기본법 위반 시 기업 규모에 따라 전 세계 매출액의 최대 7%에 해당하는 과징금 이 부과된다.","한국 AI기본법은 인공지능 제공자와 이용사업자를 포괄해 공통적인 의무를 부과하는 반 면, EU AI법은 공급자, 배포자, 수입자 등을 나누어 차등 의무를 부과한다."]},{"id":506,"type":"mc","text":"인터넷에 공개된 개인정보를 수집·이용하여 AI를 학습시킬 때, 「개인정보 보호법」상 실질적 인 적법 근거로 활용될 수 있는 조항은 무엇인가?","answer":"정당한 이익 조항","explanation":"개인정보보호위원회 안내서에 따르면, 공개된 개인정보 수집 시 「개인정보 보호법」상의 '정 당한 이익 조항(법 제15조 제1항 제6호)'이 실질적인 적법 근거로 활용될 수 있습니다.","options":["정당한 이익 조항","동의 없는 제3자 제공 조항","가명정보 특례 조항","정보주체 권리 제한 조항"]},{"id":509,"type":"mc","text":"AI 모델의 편향성(Bias)을 진단하고 완화하여 공정성을 확보하는 데 도움을 주는 오픈소스 도 구와 거리가 먼 것은?","answer":"Stable Diffusion","explanation":"IBM AI Fairness 360, Google What-If Tool, Microsoft Fairlearn은 모두 AI의 편향성을 진단하 고 공정성을 확보하기 위한 대표적인 오픈소스 도구입니다. 반면 Stable Diffusion은 이미지 생성 AI입니다.","options":["IBM AI Fairness 360","Google What-If Tool","Microsoft Fairlearn","Stable Diffusion"]},{"id":510,"type":"mc","text":"기업의 AI 윤리 및 거버넌스 구축 사례에 대한 설명으로 틀린 것은?","answer":"IBM은 AI가 최종적으로 인간의 지능을 완전히 대체해야 한다는 철학을 강조한다.","explanation":"IBM은 AI가 인간 지능을 완전히 대체해야 한다고 보지 않으며, 오히려 인간 지능을 증강 (Augment Human Intelligence)하는 도구로 활용되어야 한다는 윤리 원칙을 강조합니다.","options":["삼성전자는 AI Red Team을 운영하여 생성형 AI의 위험을 검증한다.","네이버는 'AI는 완벽할 수 없다'는 전제하에 지속적인 개선을 준칙으로 삼고 있다.","카카오는 공동체 기술윤리 위원회를 출범해 제도적 거버넌스 체계를 구축했다.","IBM은 AI가 최종적으로 인간의 지능을 완전히 대체해야 한다는 철학을 강조한다."]},{"id":511,"type":"mc","text":"EU 인공지능법(EU AI Act)에 따라 인간의 인지 행동을 왜곡하거나 시민에 대한 소셜 스코어 링(사회적 점수 평가)을 허용하는 AI 시스템이 속하는 위험 등급은?","answer":"수용 불가 위험 (Unacceptable Risk)","explanation":"EU AI법은 인간의 기본권을 명백히 위협하는 인지 행동 왜곡이나 소셜 스코어링 시스템을 ' 수용 불가 위험(Unacceptable Risk)'으로 분류하여 엄격히 금지하고 있습니다.","options":["수용 불가 위험 (Unacceptable Risk)","고위험 (High Risk)","제한적 위험 (Limited Risk)","저위험 (Minimal Risk)"]},{"id":515,"type":"sa","text":"AI기본법상 생성형 AI 결과물을 외부로 반출할 때 사업자는 '사람이 인식할 수 있는 방법'과 ' 기계가 판독할 수 있는 방법'을 통해 AI 생성물임을 표시해야 합니다. 각각의 구체적인 예시 를 한 가지씩 기재하시오.","answer":"가시· 가청적 워터마 크","explanation":"시행령에 따르면 생성물을 외부로 반출할 때 사람이 인식할 수 있는 방법으로는 '가시적이거 나 가청적인 워터마크'를, 기계가 판독할 수 있는 방법으로는 '메타데이터' 등을 명확히 적용 해야 합니다."},{"id":516,"type":"sa","text":"AI기본법에 따른 '고영향 AI' 판단 기준 중, AI 시스템이 10개 특정 영역에서 활용되더라도 최종 의사결정 과정에 **[ 이것 ]**이 개입하는 경우에는 통제 가능한 것으로 판단하여 고영 향 AI 대상에서 제외합니다. 빈칸에 들어갈 말은 무엇입니까?","answer":"사람 (또는 사람의 관리· 감독)","explanation":"10대 고영향 영역이라도 AI가 완전히 독립적으로 의사결정을 내리지 않고 인간(사람)이 최종 판단에 개입한다면 고영향 AI 대상에서 제외됩니다."},{"id":517,"type":"sa","text":"개인정보보호위원회의 안내서에 따르면, 기업 내에서 AI 데이터 처리와 관련된 개인정보 법 규 준수 및 리스크 관리를 총괄하며 AI 프라이버시 거버넌스 구축의 중심이 되어야 하는 직 책은 무엇입니까? (한글 명칭 또는 영문 약자 작성)","answer":"개인정 보 보 호책임 자 (또 는 CPO)","explanation":"개인정보보호위원회는 기업 내에 AI 프라이버시 거버넌스를 구축하고, 이를 '개인정보 보호 책임자(CPO, Chief Privacy Officer)' 중심으로 운영하여 리스크를 관리할 것을 강력히 권고했 습니다."},{"id":519,"type":"sa","text":"기업이 자체 개발하거나 서비스하는 AI 시스템의 동작 원리나 의사결정 과정을 외부 사용자 나 규제 당국이 명확히 이해하고 납득할 수 있도록 설명할 수 있어야 한다는 AI 윤리 원칙은 무엇입니까?","answer":"투명성 (Trans paren cy) 또 는 설 명 가 능성 (Explai nabilit y)","explanation":"투명성(Transparency)' 또는 '설명 가능성(Explainability)'은 비기술적인 이해관계자나 사용자, 규제 당국도 AI의 판단 근거와 작동 원리를 명확히 이해할 수 있도록 해야 한다는 원칙을 말 합니다."},{"id":526,"type":"mc","text":"시청자가 영상을 계속 볼지 결정하는 가장 중요한 시간은?","answer":"첫 3초","explanation":"훅(Hook) 문장이 시청자를 잡는 결정적 시간입니다.","options":["첫 3초","중간 10초","마지막 5초","전체 시간"]},{"id":530,"type":"mc","text":"AI로 쇼츠 대본을 작성할 때 활용하는 6단 구조는 [훅-공감-맥락-핵심-( )-마무리]이다. 빈칸 에 들어갈 단계는?","answer":"행동(Action)","explanation":"AI를 활용한 쇼츠(Shorts) 대본 작성 시 '6단 구조'는 효과적인 스토리텔링 프레임워크입니다. ①훅(Hook): 첫 3초 안에 시청자 시선을 사로잡는 강렬한 도입부 ②공감(Empathy): 시청자가 '나도 그래!'라고 느끼게 만드는 공감 포인트 ③맥락(Context): 문제 상황이나 배경 정보를 간결하게 전달 ④핵심(Core): 전달하고자 하는 핵심 메시지·솔루션 제시 ⑤행동(Action): 시청자에게 구체적 행동을 유도하는 CTA(Call To Action) 단계 — '좋아요', ' 팔로우', '댓글', '링크 클릭' 등 ⑥마무리(Closing): 인상 깊은 한 줄로 영상을 마무리 AI에게 이 6단 구조를 프롬프트로 제시하면, 체계적이고 완성도 높은 대본을 생성할 수 있습 니다. 특히 '행동(Action)' 단계가 없으면 영상의 목적(전환·구독 유도 등)을 달성하기 어렵습니 다.","options":["요약(Summary)","행동(Action)","반복(Repeat)","분석(Analysis)"]},{"id":552,"type":"mc","text":"AI 영상 생성 프롬프트 9요소 중, 동일한 장면에서 패닝·틸트·돌리·줄 등을 지정해 영상의 역 동성과 몰입감을 좌우하는 요소는?","answer":"Camera Movement","explanation":"AI 영상 생성 프롬프트 9요소는 고품질 영상을 만들기 위해 AI에게 전달해야 할 핵심 구성 요 소입니다. ① Subject(피사체): 영상의 주인공·중심 대상 ② Action(동작): 피사체가 수행하는 행동 ③ Setting(배경): 장소·환경 설정 ④ Camera Angle(카메라 앵글): 촬영 각도 (로우앵글, 버드아이뷰 등) ⑤ Camera Movement(카메라 무브먼트): 카메라 이동 방식 — 패닝(좌우), 틸트(상하), 돌리 (회전), 줄(확대/축소), 트래킹(추적) 등 ⑥ Lighting(조명): 자연광, 스튜디오 조명, 네온 등 분위기 설정 ⑦ Style(스타일): 영상의 시각적 톤 (시네마톡, 다큐멘터리 등) ⑧ Mood(분위기): 감정적 톤 (긴장감, 평화로움 등) ⑨ Output(출력 설정): 해상도, 화면비, 길이 등 기술적 사양 이 중 Camera Movement는 영상의 역동성과 몰입감을 결정하는 핵심 요소로, 동일한 장면이 라도 카메라 이동에 따라 완전히 다른 느낌의 영상이 만들어집니다. 혼동하기 쉬운 Camera Angle(촬영 각도)과 구분해야 합니다.","options":["Camera Angle","Camera Movement","Lighting","Style"]},{"id":553,"type":"mc","text":"AI 영상 생성 프롬프트에서 카메라가 피사체 쪽으로 점점 다가가며 집중도와 긴장감을 높이 는 카메라 무브먼트 기법은?","answer":"Dolly In (돌리 인)","explanation":"Dolly In(돌리 인)은 카메라가 피사체 쪽으로 물리적으로 이동하며 점점 다가가는 기법으로, 시청자의 집중도와 감정적 몰입감을 높이는 데 효과적입니다. AI 영상 프롬프트 예시: • \"dolly in shot, slowly approaching the subject's face, emotional close-up\" • 제품 홈보 영상에서 핵심 기능을 강조할 때 활용 • 인터뷰 영상에서 발화자의 감정을 극대화할 때 활용 다른 보기 설명: • Slow Pan: 카메라가 좌우로 천천히 회전하며 공간을 훑는 기법 • Handheld: 카메라를 손으로 들고 촬영하여 현장감·날것의 느낌을 주는 기법 • Tilt Up: 카메라가 아래에서 위로 수직 이동하며 대상의 웅장함을 강조하는 기법","options":["Slow Pan (슬로우 패)","Dolly In (돌리 인)","Handheld (핸드헬드)","Tilt Up (틸트 업)"]},{"id":554,"type":"mc","text":"CapCut 편집 시 쇼츠 해상도로 가장 적절한 값은?","answer":"1080 x 1920","explanation":"1080 x 1920가 고화질 세로 영상(9:16)의 표준 해상도입니다.","options":["720 x 1280","1080 x 1920","1920 x 1080","1080 x 1080"]},{"id":557,"type":"mc","text":"AI 영상 제작 도구 중, 공개된 URL(블로그·뉴스 기사 등) 하나만 입력하면 해당 콘텐츠를 분 석해 30초 쇼츠 초안을 자동 생성해주는 서비스는?","answer":"Daven AI (데이븐 AI)","explanation":"Daven AI(데이븐 AI)는 URL 하나만 입력하면 해당 웹페이지의 콘텐츠를 AI가 자동 분석하여, 기획(대본)부터 영상 초안까지 생성해주는 AI 영상 제작 서비스입니다. 주요 특징: • URL 입력만으로 콘텐츠 분석 → 대본 작성 → 30초 쇼츠 초안 자동 생성 • 블로그 글, 뉴스 기사, 제품 페이지 등 다양한 URL 지원 • 영상 제작 경험이 없는 사람도 손쉽게 쇼츠 콘텐츠 제작 가능 다른 보기 설명: • Canva: AI 디자인 툴로 포스터·프레젠테이션·영상 등 제작 (URL만으로 자동 쇼츠 생성은 비 지원) • CapCut: 영상 편집 전문 도구로 자막·이펙트 등 편집 기능이 강점 (URL 기반 자동 생성은 비지원) • Pictory: 텍스트를 입력하면 AI가 영상을 만들어주는 도구 (URL이 아닌 텍스트 기반)","options":["Canva (캔바)","Daven AI (데이븐 AI)","CapCut (캡컷)","Pictory (픽토리)"]},{"id":561,"type":"mc","text":"AI 활용 쇼츠 영상 제작 워크플로우는 [기획 → 이미지 생성 → ( ) → 편집]이다. 빈칸에 들어 갈 단계는?","answer":"영상 클립 생성","explanation":"AI 활용 쇼츠 영상 제작은 다음 4단계 워크플로우를 따릅니다: ① 기획: 콘셉트·대본·스토리보드 구성 ② 이미지 생성: Midjourney, DALL-E 등으로 장면별 이미지 제작 ③ 영상 클립 생성: 정지 이미지를 AI 영상 도구(Runway, Pika 등)로 움직이는 영상 클립으로 변환 ④ 편집: 클립들을 이어붙이고 자막·BGM·효과 추가 '영상 클립 생성'은 정지 이미지에 움직임을 부여하는 핵심 단계로, 이 과정이 빠지면 이미지 슬라이드쇼에 불과하게 됩니다. 다른 보기 설명: • 자막 삽입·색보정·BGM 추가는 모두 ④편집 단계에 포함되는 세부 작업입니다.","options":["자막 삽입","영상 클립 생성","색보정 (Color Grading)","배경 음악 추가"]},{"id":562,"type":"mc","text":"AI 활용 콘텐츠 제작의 핵심 원칙은 \"AI는 ( )을 만들고, 최종 판단은 사람이 한다\"이다. 빈칸 에 들어갈 말은?","answer":"초안","explanation":"AI 활용 콘텐츠 제작의 핵심 원칙은 \"AI는 초안(Draft)을 만들고, 최종 판단은 사람이 한다\"입 니다. AI는 빠르게 초안을 생성하는 데 탁월하지만, 다음과 같은 한계가 있어 사람의 검토가 반드시 필요합니다: • 브랜드 톤·메시지 적합성 판단 • 사실관계·데이터 정확성 검증 • 저작권·윤리적 문제 확인 • 타겟 고객 맥락에 맞는 최종 조정 이 원칙은 이미지·영상·PPT·글쓰기 등 AI를 활용하는 모든 업무에 공통적으로 적용됩니다. 다른 보기 설명: • 완성본: AI 결과물은 완성본이 아닌 초안 수준이므로 부적절 • 기획안: 기획은 사람이 주도하는 영역 • 데이터: AI가 데이터를 만든다는 표현은 이 맥락에 맞지 않음","options":["완성본","초안","기획안","데이터"]},{"id":590,"type":"ox","text":"PPT 전체의 비주얼 통일감을 위해 하나의 프롬프트 스타일을 일관되게 유지하는 것이 좋다.","answer":"O","explanation":"동일한 프롬프트 스타일을 유지하면 슬라이드 간 비주얼 톤이 일관되게 유지되어 전체 PPT 의 완성도가 높아집니다."}]
</script>

<script>
(function(){
  var QS  = JSON.parse(document.getElementById('qdata').textContent);
  var SK  = 'posco_sel_v2';
  var tab = 'all', fil = 'all';
  var retrySet = null; // null=전체, object=다시풀기 대상 id 집합
  var st  = {a:{}, f:{}, o:[]};

  /* ── 초기화 ── */
  function initOrder(){ st.o = QS.map(function(q){ return String(q.id); }); }
  initOrder();

  /* ── 저장/불러오기 ── */
  function load(){
    try{
      var raw = localStorage.getItem(SK);
      if(!raw) return;
      var p = JSON.parse(raw);
      if(p.a) st.a = p.a;
      if(p.f) st.f = p.f;
      if(p.o && p.o.length === QS.length) st.o = p.o;
    }catch(e){}
  }
  function save(){
    try{ localStorage.setItem(SK, JSON.stringify(st)); }catch(e){}
  }

  /* ── 헬퍼 ── */
  function getQ(id){
    var sid = String(id);
    for(var i=0; i<QS.length; i++){ if(String(QS[i].id)===sid) return QS[i]; }
    return null;
  }

  function esc(s){
    return String(s||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 통계 ── */
  function updateStats(){
    var ak=Object.keys(st.a), ok=0, ng=0;
    for(var i=0;i<ak.length;i++){ if(st.a[ak[i]].correct) ok++; else ng++; }
    var fk=Object.keys(st.f), fv=0;
    for(var i=0;i<fk.length;i++){ if(st.f[fk[i]]) fv++; }
    document.getElementById('sc').textContent = ok;
    document.getElementById('sw').textContent = ng;
    document.getElementById('sf').textContent = fv;
    var done = ak.length, total = QS.length;
    document.getElementById('ptxt').textContent = done+' / '+total+' 완료';
    document.getElementById('pb').style.width   = (done/total*100)+'%';
  }

  /* ── 문제 목록 계산 ── */
  function allOrderedQs(){
    var out=[];
    for(var i=0;i<st.o.length;i++){ var q=getQ(st.o[i]); if(q) out.push(q); }
    return out;
  }

  function applyFilter(qs){
    return qs.filter(function(q){
      var k=String(q.id);
      if(fil==='ox' && q.type!=='ox') return false;
      if(fil==='mc' && q.type!=='mc') return false;
      if(fil==='sa' && q.type!=='sa') return false;
      if(fil==='un' && st.a[k])       return false;
      return true;
    });
  }

  /* ── 문제 카드 렌더 ──
     BUG FIX: textarea를 getElementById로 찾으면 display:none 탭에 있는
     동일 id 요소를 먼저 반환할 수 있음.
     → 확인 버튼의 data-k 대신, 버튼에서 btn.previousElementSibling 으로
       같은 .saw 안의 textarea를 바로 찾아 ID 충돌을 원천 차단. */
  function rq(q){
    var k   = String(q.id);
    var ans = st.a[k];
    var fav = !!st.f[k];
    var done= !!ans;

    var ind = done
      ? (ans.correct
          ? '<span class="ind io">&#10003; 정답</span>'
          : '<span class="ind ix">&#10007; 오답</span>')
      : '<span class="ind ip">미완료</span>';

    var bdg = q.type==='ox'  ? '<span class="badge box">O/X</span>'
            : q.type==='mc'  ? '<span class="badge bmc">객관식</span>'
            :                  '<span class="badge bsa">단답형</span>';

    var favBtn = '<button class="favb'+(fav?' on':'')+'" data-k="'+k+'" onclick="APP.fav(this)">&#9733;</button>';

    var inp = '';
    if(q.type==='ox'){
      var oC=(ans&&ans.given==='O')?' so':'';
      var xC=(ans&&ans.given==='X')?' sx':'';
      var d =done?' disabled':'';
      inp = '<div class="oxb">'
          + '<button class="ob'+oC+'"'+d+' data-k="'+k+'" data-v="O" onclick="APP.ox(this)">&#9675; O (맞다)</button>'
          + '<button class="ob'+xC+'"'+d+' data-k="'+k+'" data-v="X" onclick="APP.ox(this)">&#10005; X (틀리다)</button>'
          + '</div>';
    } else if(q.type==='mc'){
      var opts='', os=q.options||[];
      for(var i=0;i<os.length;i++){
        var sc=(ans&&ans.given===os[i])?' sel':'';
        var d2=done?' disabled':'';
        opts += '<button class="mo'+sc+'"'+d2+' data-k="'+k+'" data-i="'+i+'" onclick="APP.mc(this)">'
              + '<span class="ol">'+(i+1)+'</span>'+esc(os[i])+'</button>';
      }
      inp = '<div class="mco">'+opts+'</div>';
    } else {
      /* 단답형:
         - textarea에 id를 부여하지 않음 (id 중복 충돌 방지)
         - 확인 버튼에 data-k만 부여
         - APP.sa 에서 btn.previousElementSibling 으로 textarea 탐색 */
      var val = (ans&&ans.given) ? esc(ans.given) : '';
      var d3  = done ? ' disabled' : '';
      inp = '<div class="saw">'
          + '<textarea class="sai"'+d3+' rows="1" placeholder="답을 입력하세요...">'+val+'</textarea>'
          + '<button class="subb"'+d3+' data-k="'+k+'" onclick="APP.sa(this)">확인</button>'
          + '</div>';
    }

    var fbk = '';
    if(done){
      var fc = ans.correct ? 'fbk ok show' : 'fbk ng show';
      var ic = ans.correct ? '&#9989; 정답입니다!' : '&#10060; 틀렸습니다';
      fbk = '<div class="'+fc+'">'
          + '<div class="fbh">'+ic+'</div>'
          + '<div class="fba">정답: <strong>'+esc(q.answer)+'</strong></div>'
          + '<div>'+esc(q.explanation||'')+'</div>'
          + '</div>';
    }

    return '<div class="qcard" id="qc-'+k+'">'
      + ind
      + '<div class="qm"><span class="qn">No.'+q.id+'</span>'+bdg+favBtn+'</div>'
      + '<div class="qt">'+esc(q.text)+'</div>'
      + inp + fbk
      + '</div>';
  }

  function setEl(id, qs, em){
    var el = document.getElementById(id);
    if(!qs.length){ el.innerHTML='<div class="empty">'+em+'</div>'; return; }
    var p=[];
    for(var i=0;i<qs.length;i++) p.push(rq(qs[i]));
    el.innerHTML = p.join('');
  }

  /* ── 렌더 ── */
  function renderAll(){
    setEl('ql', applyFilter(allOrderedQs()), '해당 조건의 문제가 없습니다.');
    updateStats();
  }

  function renderFav(){
    /* retrySet 모드면 retrySet 기준, 아니면 즐겨찾기 기준 */
    var qs = retrySet
      ? QS.filter(function(q){ return !!retrySet[String(q.id)]; })
      : QS.filter(function(q){ return !!st.f[String(q.id)]; });

    var stopBtn = document.getElementById('stop-fav');
    if(stopBtn) stopBtn.style.display = retrySet ? '' : 'none';

    if(!qs.length){
      document.getElementById('fl').innerHTML =
        '<div class="empty">즐겨찾기한 문제가 없습니다. &#9733; 버튼을 눌러 추가하세요.</div>';
      updateStats(); return;
    }
    var p=[];
    for(var i=0;i<qs.length;i++) p.push(rq(qs[i]));
    document.getElementById('fl').innerHTML = p.join('');
    updateStats();
  }

  function renderWrong(){
    /* retrySet 모드면 retrySet 기준, 아니면 오답 기준 */
    var qs = retrySet
      ? QS.filter(function(q){ return !!retrySet[String(q.id)]; })
      : QS.filter(function(q){ var a=st.a[String(q.id)]; return a&&!a.correct; });

    var stopBtn = document.getElementById('stop-wrong');
    if(stopBtn) stopBtn.style.display = retrySet ? '' : 'none';

    if(!qs.length){
      document.getElementById('wl').innerHTML = '<div class="empty">&#127881; 틀린 문제가 없습니다!</div>';
      updateStats(); return;
    }
    var p=[];
    for(var i=0;i<qs.length;i++) p.push(rq(qs[i]));
    document.getElementById('wl').innerHTML = p.join('');
    updateStats();
  }

  function redraw(){
    if(tab==='all')        renderAll();
    else if(tab==='fav')   renderFav();
    else                   renderWrong();
  }

  /* ── 이벤트 핸들러 ── */
  window.APP = {
    ox: function(btn){
      var k=btn.dataset.k, g=btn.dataset.v;
      var q=getQ(k); if(!q) return;
      st.a[k]={given:g, correct:g===q.answer};
      save(); redraw();
    },
    mc: function(btn){
      var k=btn.dataset.k, i=parseInt(btn.dataset.i,10);
      var q=getQ(k); if(!q) return;
      var g=(q.options||[])[i];
      st.a[k]={given:g, correct:g===q.answer};
      save(); redraw();
    },
    /* BUG FIX: getElementById 대신 btn.previousElementSibling 으로 textarea 탐색
       → 다른 탭의 동일 id textarea와 충돌하지 않음 */
    sa: function(btn){
      var k  = btn.dataset.k;
      var ta = btn.previousElementSibling; // .saw 안의 textarea
      if(!ta || ta.tagName !== 'TEXTAREA') return;
      var g  = ta.value.trim();
      if(!g) return;
      var q  = getQ(k); if(!q) return;
      st.a[k]={given:g, correct:g.toLowerCase()===q.answer.toLowerCase()};
      save(); redraw();
    },
    fav: function(btn){
      var k=btn.dataset.k;
      st.f[k]=!st.f[k];
      save(); redraw();
    }
  };

  /* ── 탭 / 필터 ── */
  window.switchTab = function(t){
    tab=t; retrySet=null;
    ['all','fav','wrong'].forEach(function(x){
      document.getElementById('tb-'+x).classList.toggle('active', x===t);
      document.getElementById('pv-'+x).style.display = x===t ? '' : 'none';
    });
    /* 모드 종료 버튼 숨기기 */
    var sf=document.getElementById('stop-fav'),sw=document.getElementById('stop-wrong');
    if(sf) sf.style.display='none';
    if(sw) sw.style.display='none';
    redraw();
  };

  window.setFilter = function(f){
    fil=f;
    ['all','ox','mc','sa','un'].forEach(function(x){
      var el=document.getElementById('ff-'+x);
      if(el) el.classList.toggle('on', x===f);
    });
    renderAll();
  };

  window.doShuffle = function(){
    var arr=st.o.slice();
    for(var i=arr.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
    }
    st.o=arr; save(); renderAll();
  };

  window.doReorder = function(){
    initOrder(); save(); renderAll();
  };

  /* ── 다시 풀기 ──
     핵심 순서: 1) retrySet 먼저 등록 → 2) 답 삭제 → 3) 렌더
     renderFav/Wrong 에서 retrySet 기준으로 문제를 가져오므로
     답을 지운 뒤에도 올바른 문제 목록이 표시됨 */
  window.retryFav = function(){
    var qs=QS.filter(function(q){ return !!st.f[String(q.id)]; });
    if(!qs.length){ alert('즐겨찾기한 문제가 없습니다.'); return; }
    retrySet={};
    qs.forEach(function(q){ retrySet[String(q.id)]=true; });
    qs.forEach(function(q){ delete st.a[String(q.id)]; });
    save(); renderFav();
  };

  window.retryWrong = function(){
    var qs=QS.filter(function(q){ var a=st.a[String(q.id)]; return a&&!a.correct; });
    if(!qs.length){ alert('틀린 문제가 없습니다.'); return; }
    retrySet={};
    qs.forEach(function(q){ retrySet[String(q.id)]=true; });
    qs.forEach(function(q){ delete st.a[String(q.id)]; });
    save(); renderWrong();
  };

  window.clearRetry = function(){
    retrySet=null;
    redraw();
  };

  /* ── 초기화 ── */
  window.confirmReset = function(){
    if(!confirm('정말 모든 학습 기록과 즐겨찾기를 초기화할까요?')) return;
    localStorage.removeItem(SK);
    st={a:{},f:{},o:[]};
    initOrder();
    tab='all'; fil='all'; retrySet=null;
    ['all','fav','wrong'].forEach(function(x){
      document.getElementById('tb-'+x).classList.toggle('active', x==='all');
      document.getElementById('pv-'+x).style.display = x==='all' ? '' : 'none';
    });
    ['all','ox','mc','sa','un'].forEach(function(x){
      var el=document.getElementById('ff-'+x);
      if(el) el.classList.toggle('on', x==='all');
    });
    var sf=document.getElementById('stop-fav'),sw=document.getElementById('stop-wrong');
    if(sf) sf.style.display='none';
    if(sw) sw.style.display='none';
    updateStats(); renderAll();
  };

  load();
  redraw();
})();
</script>
</body>
</html>
